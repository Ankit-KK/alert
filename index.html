<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Siddharth Donation Alert | Futuristic Gold Cyber UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* cleaner overlay feel */
    }

    /* FULLY TRANSPARENT BACKGROUND – no grey panel, no solid rectangle, no inner layer */
    body {
      background: transparent;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', 'Rajdhani', 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* ========= MAIN ALERT CONTAINER – ultra‑wide, premium gold frame ========= */
    .donation-alert {
      position: relative;
      width: 1080px;
      max-width: 90vw;
      min-width: 860px;
      background: transparent; /* CRITICAL: NO BACKGROUND, fully transparent */
      border: 2px solid rgba(255, 215, 0, 0.95);
      border-radius: 28px;
      /* GLOWING FRAME EFFECT – cinematic gold aura */
      box-shadow: 0 0 12px rgba(255, 200, 0, 0.7), 0 0 24px rgba(255, 180, 0, 0.4), inset 0 0 12px rgba(255, 215, 0, 0.2);
      transition: all 0.2s ease;
      backdrop-filter: none;  /* ensure zero opaque layer */
      overflow: visible;
      /* spacing proportions from reference */
      padding: 16px 24px 16px 20px;
    }

    /* ADDITIONAL TECH CORNERS – same corner design language, sharp cyber brackets */
    .donation-alert::before,
    .donation-alert::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: #FFD966;
      border-style: solid;
      filter: drop-shadow(0 0 5px #ffb347);
      pointer-events: none;
    }
    .donation-alert::before {
      top: -2px;
      left: -2px;
      border-width: 3px 0 0 3px;
      border-radius: 8px 0 0 0;
    }
    .donation-alert::after {
      bottom: -2px;
      right: -2px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 8px 0;
    }
    /* additional corner accents (dual layer) */
    .donation-alert .corner-accent {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: #FFD966;
      border-style: solid;
      filter: drop-shadow(0 0 4px #ffaa33);
      pointer-events: none;
    }
    .donation-alert .corner-accent-1 {
      top: -2px;
      right: -2px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 8px 0;
    }
    .donation-alert .corner-accent-2 {
      bottom: -2px;
      left: -2px;
      border-width: 3px 0 0 3px;
      border-radius: 8px 0 0 0;
    }

    /* FLEX LAYOUT — exact same mascot | text block | equalizer */
    .alert-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: 100%;
      background: transparent;
      position: relative;
      z-index: 2;
    }

    /* ========= MASCOT / AVATAR (exact positioning & scale) ========= */
    .mascot-wrapper {
      flex-shrink: 0;
      position: relative;
      filter: drop-shadow(0 0 12px #ffbb44);
    }
    .mascot-img {
      width: 92px;
      height: 92px;
      object-fit: cover;
      border-radius: 50%;
      border: 2.5px solid #FFD700;
      box-shadow: 0 0 18px rgba(255, 200, 0, 0.8), inset 0 0 5px rgba(255, 220, 100, 0.6);
      background: transparent;
      transition: transform 0.2s;
      display: block;
    }
    /* If sidd-logo.jpg missing, maintain a high-tech fallback, but still transparent */
    .mascot-img {
      background: rgba(0,0,0,0); /* no solid fill */
    }

    /* ========= TEXT AREA (typography hierarchy & spacing) ========= */
    .alert-text {
      flex: 1;
      background: transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding-right: 8px;
    }
    /* upper row: USERNAME + donation amount */
    .name-amount-row {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 16px;
      row-gap: 6px;
      background: transparent;
    }
    .username {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 1.5px;
      background: linear-gradient(135deg, #FFE484 10%, #FFB347 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px rgba(255, 200, 0, 0.7);
      font-family: 'Orbitron', 'Rajdhani', monospace;
      white-space: nowrap;
    }
    .amount {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(145deg, #FFD966, #FFAA33);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(255, 180, 0, 0.8);
      letter-spacing: 1px;
      font-family: 'Orbitron', monospace;
      white-space: nowrap;
    }
    /* message row with "TEXT" label + quoted message */
    .message-row {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
      background: transparent;
      margin-top: 4px;
    }
    .text-label {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #ffdd99;
      text-transform: uppercase;
      background: rgba(0,0,0,0.2);
      background: transparent;
      text-shadow: 0 0 5px #ffaa44;
      border-right: 1.5px solid #FFD966;
      padding-right: 10px;
      font-family: 'Rajdhani', monospace;
    }
    .message-quote {
      font-size: 22px;
      font-weight: 500;
      color: #FFF2D0;
      text-shadow: 0 0 8px #ffbb55, 0 1px 2px #00000030;
      letter-spacing: 0.3px;
      font-family: 'Poppins', 'Orbitron', sans-serif;
      background: transparent;
      white-space: nowrap;
    }
    /* for responsiveness, allow slight wrap on narrow screens */
    @media (max-width: 950px) {
      .username { font-size: 30px; white-space: normal; }
      .amount { font-size: 28px; }
      .message-quote { font-size: 18px; white-space: normal; }
      .donation-alert { min-width: 680px; padding: 14px 20px; }
      .mascot-img { width: 78px; height: 78px; }
    }

    /* ========= GLOWING EQUALIZER ICON (right side placement, exact look) ========= */
    .equalizer-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: transparent;
      padding-left: 8px;
      margin-left: 4px;
      filter: drop-shadow(0 0 6px #ffbe3c);
    }
    .eq-bar {
      width: 5px;
      background: radial-gradient(ellipse at top, #FFE484, #FFB347);
      border-radius: 3px;
      box-shadow: 0 0 8px #ffcc55, 0 0 2px #ffa500;
      transition: height 0.2s ease;
      animation: pulseEq 1.2s infinite ease-in-out alternate;
      transform-origin: bottom;
    }
    /* dynamic heights to mimic audio visualizer */
    .eq-bar:nth-child(1) { height: 18px; animation-duration: 0.9s; }
    .eq-bar:nth-child(2) { height: 32px; animation-duration: 1.1s; animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { height: 26px; animation-duration: 0.8s; animation-delay: 0.2s; }
    .eq-bar:nth-child(4) { height: 42px; animation-duration: 1.3s; animation-delay: 0.05s; }
    .eq-bar:nth-child(5) { height: 20px; animation-duration: 1.0s; animation-delay: 0.3s; }
    .eq-bar:nth-child(6) { height: 36px; animation-duration: 1.15s; animation-delay: 0.15s; }

    @keyframes pulseEq {
      0% { height: 10px; opacity: 0.7; }
      100% { height: 44px; opacity: 1; box-shadow: 0 0 12px #ffdd77; }
    }

    /* ========= PREMIUM PARTICLES / GLOW SPARKS (floating energy) ========= */
    .particle-field {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }
    .particle {
      position: absolute;
      background: radial-gradient(circle, #FFD966, #ffaa33);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      opacity: 0;
      filter: blur(1px);
      animation: floatGlow 4s infinite ease-in-out;
      box-shadow: 0 0 6px #ffb347;
    }
    /* random particle positions + delays */
    .particle:nth-child(1) { top: 15%; left: 8%; animation-delay: 0s; width: 5px; height: 5px; }
    .particle:nth-child(2) { top: 70%; left: 92%; animation-delay: 0.5s; width: 3px; height: 3px; }
    .particle:nth-child(3) { top: 40%; left: 20%; animation-delay: 1.2s; width: 6px; height: 6px; background: #ffcc55; }
    .particle:nth-child(4) { top: 85%; left: 45%; animation-delay: 0.9s; width: 4px; height: 4px; }
    .particle:nth-child(5) { top: 25%; left: 70%; animation-delay: 2s; width: 5px; height: 5px; }
    .particle:nth-child(6) { top: 60%; left: 15%; animation-delay: 1.5s; width: 3px; height: 3px; }
    .particle:nth-child(7) { top: 10%; left: 55%; animation-delay: 2.3s; width: 4px; height: 4px; }
    .particle:nth-child(8) { top: 88%; left: 78%; animation-delay: 1.8s; width: 5px; height: 5px; filter: blur(0.5px);}
    .particle:nth-child(9) { top: 45%; left: 88%; animation-delay: 0.3s; width: 3px; height: 3px; }
    .particle:nth-child(10) { top: 18%; left: 35%; animation-delay: 2.7s; width: 5px; height: 5px; }
    .particle:nth-child(11) { top: 75%; left: 62%; animation-delay: 1.1s; width: 4px; background: #FFD966; }
    .particle:nth-child(12) { top: 35%; left: 5%; animation-delay: 0.7s; width: 5px; height: 5px; }

    @keyframes floatGlow {
      0% { opacity: 0; transform: translateY(0px) scale(0.8); }
      30% { opacity: 0.9; transform: translateY(-8px) scale(1.2); }
      70% { opacity: 0.7; transform: translateY(4px) scale(1); }
      100% { opacity: 0; transform: translateY(16px) scale(0.5); }
    }

    /* additional border refinement: ultra clean edges + sharp rendering */
    .donation-alert {
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    .username, .amount, .message-quote, .text-label {
      font-smoothing: antialiased;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* subtle golden inner glow line (no background, just decorative line) */
    .donation-alert .glow-inner {
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      bottom: 4px;
      border-radius: 22px;
      border: 1px solid rgba(255, 215, 0, 0.45);
      pointer-events: none;
      box-shadow: inset 0 0 8px rgba(255, 200, 0, 0.3);
      background: transparent;
    }

    /* maintain ultra-wide composition: max width guard */
    @media (max-width: 860px) {
      .donation-alert {
        min-width: 95vw;
        padding: 12px 18px;
      }
      .mascot-img {
        width: 70px;
        height: 70px;
      }
      .username {
        font-size: 26px;
        white-space: normal;
        line-height: 1.2;
      }
      .amount {
        font-size: 24px;
      }
      .message-quote {
        font-size: 16px;
        white-space: normal;
      }
      .text-label {
        font-size: 13px;
      }
      .equalizer-area {
        gap: 3px;
      }
      .eq-bar {
        width: 4px;
      }
    }

    /* keep actual border spacing identical to design: ensures border thickness matches */
    .donation-alert {
      border-width: 2px;
    }
  </style>
</head>
<body>
  <div class="donation-alert">
    <!-- extra inner glow border to match premium cyber layer (transparent) -->
    <div class="glow-inner"></div>
    <!-- corner accents (same corner language) -->
    <div class="corner-accent corner-accent-1"></div>
    <div class="corner-accent corner-accent-2"></div>

    <!-- floating particles for premium livestream energy (transparent overlays) -->
    <div class="particle-field">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <!-- MAIN ALERT CONTENT: exact layout structure from visual reference -->
    <div class="alert-inner">
      <!-- MASCOT / AVATAR (position left, scale same as original) -->
      <div class="mascot-wrapper">
        <!-- uses root sidd-logo.jpg – exactly as described. perfect for the streamer identity -->
        <img src="sidd-logo.jpg" alt="Siddharth Mascot" class="mascot-img" onerror="this.onerror=null; this.style.border='2px solid #ffcc55'; this.style.opacity='0.95'; this.style.background='radial-gradient(circle at 30% 30%, #2a2418, #0a0804)'; this.style.boxShadow='0 0 16px #ffbb33';">
      </div>

      <!-- TEXT HIERARCHY : username + amount | text label + quote message (exact from reference) -->
      <div class="alert-text">
        <div class="name-amount-row">
          <span class="username">SIDDHARTH</span>
          <span class="amount">₹40</span>
        </div>
        <div class="message-row">
          <span class="text-label">TEXT</span>
          <span class="message-quote">“SIDD BHAI VANDAL SKIN REVIEW”</span>
        </div>
      </div>

      <!-- EQUALIZER ICON – GLOWING, same placement (far right) and design -->
      <div class="equalizer-area">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
    </div>
    <!-- No solid panels, no opaque background – only frame, mascot, text, particles, equalizer -->
  </div>

  <!-- ultra HD quality sharpness: ensures vector-like perfection + cinematic lighting -->
  <style>
    /* enhance text stroke and glow for premium streaming overlay finish */
    .username, .amount {
      font-weight: 900;
      letter-spacing: 1.2px;
      text-stroke: 0.2px rgba(255,200,100,0.5);
    }
    .message-quote {
      text-shadow: 0 0 10px rgba(255, 185, 50, 0.7), 0 1px 2px #00000020;
    }
    .text-label {
      text-shadow: 0 0 5px #f0b342;
    }
    /* glow effect for equalizer bars more intense */
    .eq-bar {
      background: linear-gradient(to top, #ffcc44, #ffaa22);
    }
    /* micro particle additional sparkle effect using pseudo spark */
    .donation-alert {
      animation: subtlePulse 3s infinite;
    }
    @keyframes subtlePulse {
      0% { box-shadow: 0 0 12px rgba(255, 200, 0, 0.6), 0 0 22px rgba(255, 170, 0, 0.3), inset 0 0 12px rgba(255, 215, 0, 0.15); }
      50% { box-shadow: 0 0 20px rgba(255, 210, 0, 0.9), 0 0 34px rgba(255, 180, 0, 0.6), inset 0 0 16px rgba(255, 215, 0, 0.3); }
      100% { box-shadow: 0 0 12px rgba(255, 200, 0, 0.6), 0 0 22px rgba(255, 170, 0, 0.3), inset 0 0 12px rgba(255, 215, 0, 0.15); }
    }
    /* force fully transparent parent – only visible elements remain */
    body, html {
      background-color: transparent;
    }
    /* no gray panel, no solid rectangle, no inner layer – ensures OBS ready */
    .donation-alert, .alert-inner, .alert-text, .mascot-wrapper, .equalizer-area, .name-amount-row, .message-row {
      background-color: transparent !important;
    }
    /* guarantee all inner containers are 100% transparent (no opac backgrounds) */
    .donation-alert, .donation-alert * {
      background-color: transparent;
    }
    /* ensuring that only frame, mascot, text, equalizer, particles, glow appear */
    .donation-alert .glow-inner {
      background: transparent;
    }
    /* maintain mascot image transparency around, no faux background */
    .mascot-img {
      background: transparent !important;
    }
    /* OBS-ready ultra clean edges & full transparency */
  </style>
  <!-- 
    DESIGN RECREATED EXACTLY: 
    - Futuristic gold cyber UI with premium glowing frame & ultra-wide horizontal layout.
    - Mascot positioned left with original scale (sidd-logo.jpg root path).
    - Typography hierarchy: SIDDHARTH | ₹40 | TEXT label + quoted message.
    - Right-side glowing equalizer icon with animated bars (exact placement).
    - Golden corner accents & double glow frame matching border thickness.
    - Floating particles (glow effects) only visible elements: no solid rectangles.
    - Fully transparent background + OBS-ready transparent PNG export style.
    - Ultra HD vector-like quality, cinematic lighting, clean modern polish.
    - No redesign – maintains original composition and spacing.
  -->
</body>
</html>
