<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SIDDHARTH — Donation Alert | OBS Ready</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; }

    body, html {
      background: transparent;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      padding: 20px;
    }

    /* ─────────────────────────────────────────
       ENTRY ANIMATION STATES
    ───────────────────────────────────────── */

    .outer-wrap {
      position: relative;
      display: inline-block;
      opacity: 0;
      transform: translateY(40px) scale(0.94);
    }
    .outer-wrap.entering {
      animation: wrapEnter 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }
    .outer-wrap.leaving {
      animation: wrapLeave 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    @keyframes wrapEnter {
      0%   { opacity:0; transform: translateY(40px) scale(0.94); }
      100% { opacity:1; transform: translateY(0)    scale(1); }
    }
    @keyframes wrapLeave {
      0%   { opacity:1; transform: translateY(0)    scale(1); }
      100% { opacity:0; transform: translateY(-28px) scale(0.95); }
    }

    /* CARD */
    .card {
      position: relative;
      width: 900px;
      max-width: 96vw;
      background: transparent;
      clip-path: polygon(
        22px 0, calc(100% - 22px) 0, 100% 22px,
        100% calc(100% - 22px), calc(100% - 22px) 100%,
        22px 100%, 0 calc(100% - 22px), 0 22px
      );
      padding: 20px 26px 20px 22px;
      z-index: 2;
      overflow: hidden;
    }

    /* GOLD FLASH */
    .flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,220,80,0.55), transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }
    .entering .flash {
      animation: flashBurst 0.7s ease-out 0.3s forwards;
    }
    @keyframes flashBurst {
      0%   { opacity: 0;   transform: scale(0.7); }
      30%  { opacity: 1;   transform: scale(1.05); }
      100% { opacity: 0;   transform: scale(1.2); }
    }

    /* SVG BORDER */
    .border-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: visible;
    }
    .border-outer {
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
    }
    .entering .border-outer {
      animation: drawBorder 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.15s forwards;
    }
    @keyframes drawBorder {
      to { stroke-dashoffset: 0; }
    }
    .border-inner {
      stroke-dasharray: 1900;
      stroke-dashoffset: 1900;
    }
    .entering .border-inner {
      animation: drawBorder 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.25s forwards;
    }

    /* INNER BEVEL */
    .inner-bevel {
      position: absolute;
      inset: 6px;
      clip-path: polygon(
        16px 0, calc(100% - 16px) 0, 100% 16px,
        100% calc(100% - 16px), calc(100% - 16px) 100%,
        16px 100%, 0 calc(100% - 16px), 0 16px
      );
      border: 1px solid rgba(255,200,70,0.22);
      pointer-events: none;
      z-index: 3;
    }

    /* CORNER BRACKETS */
    .cb {
      position: absolute;
      width: 26px; height: 26px;
      border-color: #FFE484;
      border-style: solid;
      z-index: 11;
      pointer-events: none;
      filter: drop-shadow(0 0 4px #ffcc44);
      opacity: 0;
    }
    .cb-tl { top:-2px;    left:-2px;   border-width: 3px 0 0 3px; }
    .cb-tr { top:-2px;    right:-2px;  border-width: 3px 3px 0 0; }
    .cb-bl { bottom:-2px; left:-2px;   border-width: 0 0 3px 3px; }
    .cb-br { bottom:-2px; right:-2px;  border-width: 0 3px 3px 0; }

    .entering .cb-tl { animation: cbSlide 0.35s ease 0.55s forwards; --tx:-6px; --ty:-6px; }
    .entering .cb-tr { animation: cbSlide 0.35s ease 0.60s forwards; --tx:6px;  --ty:-6px; }
    .entering .cb-bl { animation: cbSlide 0.35s ease 0.65s forwards; --tx:-6px; --ty:6px;  }
    .entering .cb-br { animation: cbSlide 0.35s ease 0.70s forwards; --tx:6px;  --ty:6px;  }
    @keyframes cbSlide {
      0%   { opacity:0; transform: translate(var(--tx), var(--ty)); }
      100% { opacity:1; transform: translate(0,0); }
    }

    /* SCAN SHIMMER */
    .scan {
      position: absolute;
      top:0; left:-40%;
      width: 35%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.09), transparent);
      transform: skewX(-18deg);
      pointer-events: none;
      z-index: 4;
      opacity: 0;
    }
    .entering .scan {
      animation: scanDelay 6s infinite linear 1.2s;
    }
    @keyframes scanDelay {
      0%   { left:-40%; opacity:0; }
      10%  { opacity:1; }
      50%  { left:120%; opacity:0; }
      100% { left:120%; opacity:0; }
    }

    /* FLOATING PARTICLES */
    .pf { position:absolute; inset:0; pointer-events:none; z-index:6; overflow:hidden; }
    .p {
      position:absolute;
      width:4px; height:4px;
      background:#FFD966;
      border-radius:50%;
      box-shadow:0 0 6px #ffcc44;
      opacity:0;
    }
    .entering .p { animation: pfloat 5s infinite ease-in-out; }
    .p:nth-child(1)  { top:10%; left:8%;   animation-delay:0.9s;  width:5px; height:5px; }
    .p:nth-child(2)  { top:75%; left:92%;  animation-delay:1.6s; }
    .p:nth-child(3)  { top:30%; left:20%;  animation-delay:2.3s;  width:6px; height:6px; }
    .p:nth-child(4)  { top:85%; left:45%;  animation-delay:1.3s; }
    .p:nth-child(5)  { top:20%; left:68%;  animation-delay:3.0s; }
    .p:nth-child(6)  { top:60%; left:15%;  animation-delay:2.7s;  width:3px; height:3px; }
    .p:nth-child(7)  { top:5%;  left:50%;  animation-delay:3.8s;  width:5px; height:5px; }
    .p:nth-child(8)  { top:90%; left:72%;  animation-delay:3.3s; }
    .p:nth-child(9)  { top:48%; left:88%;  animation-delay:1.1s;  width:4px; height:4px; }
    .p:nth-child(10) { top:18%; left:34%;  animation-delay:4.1s;  width:5px; height:5px; }
    @keyframes pfloat {
      0%   { opacity:0;   transform:translateY(0)    scale(0.5); }
      30%  { opacity:0.9; transform:translateY(-10px) scale(1.1); }
      70%  { opacity:0.5; transform:translateY(4px)   scale(0.85); }
      100% { opacity:0;   transform:translateY(18px)  scale(0.3); }
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      align-items: center;
      gap: 24px;
      position: relative;
      z-index: 5;
    }

    /* MASCOT */
    .mascot-wrap {
      flex-shrink: 0;
      position: relative;
      width: 104px; height: 104px;
      opacity: 0;
      transform: scale(0.4) rotate(-12deg);
    }
    .entering .mascot-wrap {
      animation: mascotPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s forwards;
    }
    @keyframes mascotPop {
      0%   { opacity:0; transform: scale(0.4) rotate(-12deg); }
      100% { opacity:1; transform: scale(1)   rotate(0deg); }
    }
    .mascot-bg {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #c98010, #7a4e00);
      border: 3px solid #FFD966;
      box-shadow: 0 0 20px rgba(255,185,0,0.8), inset 0 0 12px rgba(255,220,80,0.4);
      animation: mascotGlow 2s infinite alternate;
    }
    @keyframes mascotGlow {
      0%   { box-shadow: 0 0 12px rgba(255,170,0,0.6),  inset 0 0 6px  rgba(255,200,60,0.3); }
      100% { box-shadow: 0 0 28px rgba(255,210,30,0.95), inset 0 0 16px rgba(255,230,100,0.5); }
    }
    .mascot-img {
      position:absolute; inset:3px;
      width:calc(100% - 6px); height:calc(100% - 6px);
      border-radius:50%; object-fit:cover; display:block;
    }
    .mascot-fallback {
      position:absolute; inset:3px; border-radius:50%;
      display:none; align-items:center; justify-content:center;
      font-size:44px;
      background:radial-gradient(circle at 35% 30%, #a06a10, #5a3800);
    }

    /* TEXT BLOCK */
    .text-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .username, .amount-row, .message {
      opacity: 0;
      transform: translateX(-22px);
    }
    .entering .username   { animation: textSlide 0.45s cubic-bezier(0.22,1,0.36,1) 0.62s forwards; }
    .entering .amount-row { animation: textSlide 0.45s cubic-bezier(0.22,1,0.36,1) 0.76s forwards; }
    .entering .message    { animation: textSlide 0.45s cubic-bezier(0.22,1,0.36,1) 0.90s forwards; }
    @keyframes textSlide {
      0%   { opacity:0; transform:translateX(-22px); }
      100% { opacity:1; transform:translateX(0); }
    }

    /* Username — Syne, no stroke */
    .username {
      font-family: 'Syne', sans-serif;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #FFD340;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.9),
        0 0 18px rgba(255,200,30,0.85),
        0 0 36px rgba(255,150,0,0.5);
      line-height: 1.1;
    }

    .amount-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-top: 2px;
    }

    /* Amount — Syncopate for the number */
    .amount {
      font-family: 'Syncopate', sans-serif;
      font-size: 38px;
      font-weight: 700;
      color: #FFD340;
      letter-spacing: 2px;
      line-height: 1.1;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.9),
        0 0 18px rgba(255,200,30,0.85),
        0 0 36px rgba(255,150,0,0.5);
    }

    /* Badge — Syncopate for the label too, feels cohesive */
    .text-badge {
      font-family: 'Syncopate', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #FFD340;
      text-transform: uppercase;
      text-shadow:
        0 2px 6px rgba(0,0,0,0.85),
        0 0 12px rgba(255,185,30,0.8);
    }

    /* Message — Syne, warm cream, no stroke */
    .message {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #FFF0DC;
      letter-spacing: 0.3px;
      margin-top: 6px;
      text-shadow:
        0 2px 6px rgba(0,0,0,0.85),
        0 0 14px rgba(255,160,50,0.55);
    }

    /* EQUALIZER */
    .eq {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 64px;
      padding-right: 4px;
      opacity: 0;
    }
    .entering .eq {
      animation: eqFadeIn 0.4s ease 1.0s forwards;
    }
    @keyframes eqFadeIn {
      to { opacity:1; }
    }
    .bar {
      width: 7px;
      background: linear-gradient(to top, #c97e00, #FFD340, #FFF5AA);
      border-radius: 2px 2px 1px 1px;
      box-shadow: 0 0 8px rgba(255,190,30,0.8);
    }
    .entering .bar { animation: eqAnim 1s infinite ease-in-out alternate; }
    .bar:nth-child(1) { animation-duration:0.7s;  animation-delay:1.0s; }
    .bar:nth-child(2) { animation-duration:1.1s;  animation-delay:1.15s; }
    .bar:nth-child(3) { animation-duration:0.85s; animation-delay:1.05s; }
    .bar:nth-child(4) { animation-duration:0.6s;  animation-delay:1.25s; }
    .bar:nth-child(5) { animation-duration:1.0s;  animation-delay:1.1s; }
    .bar:nth-child(6) { animation-duration:0.75s; animation-delay:1.2s; }
    .bar:nth-child(7) { animation-duration:0.9s;  animation-delay:1.08s; }
    @keyframes eqAnim {
      0%   { height:8px;  opacity:0.65; }
      100% { height:56px; opacity:1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width:700px) {
      .card { padding:14px 16px; }
      .username { font-size:28px; letter-spacing:2px; }
      .amount   { font-size:28px; }
      .text-badge { font-size:10px; }
      .message { font-size:16px; }
      .mascot-wrap { width:78px; height:78px; }
      .eq { height:48px; }
    }
  </style>
</head>
<body>
  <div class="outer-wrap" id="alertWrap">

    <div class="card">

      <div class="flash"></div>

      <svg class="border-svg" viewBox="0 0 900 144" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="gf" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polygon class="border-outer"
          points="22,1 878,1 899,22 899,122 878,143 22,143 1,122 1,22"
          fill="none" stroke="#FFD966" stroke-width="2.5" filter="url(#gf)"
        />
        <polygon class="border-inner"
          points="30,9 870,9 891,30 891,114 870,135 30,135 9,114 9,30"
          fill="none" stroke="rgba(255,200,70,0.28)" stroke-width="1"
        />
      </svg>

      <div class="cb cb-tl"></div>
      <div class="cb cb-tr"></div>
      <div class="cb cb-bl"></div>
      <div class="cb cb-br"></div>

      <div class="inner-bevel"></div>
      <div class="scan"></div>

      <div class="pf">
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div>
      </div>

      <div class="layout">

        <div class="mascot-wrap">
          <div class="mascot-bg"></div>
          <img src="sidd-logo.jpg" alt="Siddharth" class="mascot-img"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="mascot-fallback">🐒</div>
        </div>

        <div class="text-block">
          <div class="username">SIDDHARTH</div>
          <div class="amount-row">
            <div class="amount">₹40</div>
            <div class="text-badge">TEXT</div>
          </div>
          <div class="message">"SIDD BHAI VANDAL SKIN REVIEW"</div>
        </div>

        <div class="eq">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const wrap = document.getElementById('alertWrap');

    function playEnter() {
      wrap.classList.remove('leaving');
      wrap.classList.add('entering');
    }

    function playLeave() {
      wrap.classList.remove('entering');
      wrap.classList.add('leaving');
    }

    window.addEventListener('load', () => {
      setTimeout(playEnter, 100);
      // setTimeout(playLeave, 8000);
    });
  </script>
</body>
</html>
