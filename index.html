<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Alert - Angled Gold</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI Black', 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Main Container - Wider and Responsive */
        .alert-container {
            position: relative;
            width: 90vw;
            max-width: 1600px;
            height: 260px;
            opacity: 0;
            transform: translateX(-50px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: 0 auto;
        }

        .alert-container.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .alert-container.hide {
            opacity: 0;
            transform: translateX(-50px) scale(0.95);
        }

        /* 
           CORNER STYLE: CHAMFERED (ANGLED /)
           Using clip-path to cut the corners of the background/border layers
        */
        .shape-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* This creates the angled corners */
            clip-path: polygon(
                25px 0, calc(100% - 25px) 0, 
                100% 25px, 100% calc(100% - 25px), 
                calc(100% - 25px) 100%, 25px 100%, 
                0 calc(100% - 25px), 0 25px
            );
        }

        /* Outer Gold Border (Created by placing a smaller shape inside a larger one) */
        .outer-border {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            z-index: 1;
        }

        /* Inner Dark Background (Sits on top of outer-border, leaving 3px gap for border) */
        .inner-bg {
            background: #1a1a1a; /* Dark gray, slightly softer than pure black */
            /* Inset by 3px to reveal the outer-border behind it */
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            /* Slightly different clip-path to follow the angle perfectly */
            clip-path: polygon(
                26px 0, calc(100% - 26px) 0, 
                100% 26px, 100% calc(100% - 26px), 
                calc(100% - 26px) 100%, 26px 100%, 
                0 calc(100% - 26px), 0 26px
            );
            z-index: 2;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Inner subtle tech lines */
        .inner-lines {
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            clip-path: polygon(
                22px 0, calc(100% - 22px) 0, 
                100% 22px, 100% calc(100% - 22px), 
                calc(100% - 22px) 100%, 22px 100%, 
                0 calc(100% - 22px), 0 22px
            );
            z-index: 3;
        }

        /* Content Layout */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 80px; /* Increased padding to prevent text cutoff */
            gap: 40px;
        }

        /* Avatar Section */
        .avatar-section {
            position: relative;
            width: 160px;
            height: 160px;
            flex-shrink: 0;
        }

        .avatar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 215, 0, 0.8);
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            animation: rotate 20s linear infinite;
        }

        .avatar-ring::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px dashed rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: spin 15s linear infinite reverse;
        }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #111;
            border: 2px solid #1a1a1a;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Text Section - Fixed cutoff issue */
        .text-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0; /* Allows flex child to shrink if needed, preventing overflow */
        }

        .name {
            font-size: 56px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            line-height: 1;
            /* Gradient Text */
            background: linear-gradient(to bottom, #FFE66D, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .amount-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 10px;
        }

        .rupee {
            font-size: 40px;
            font-weight: 700;
            color: #FFD700;
            opacity: 0.9;
        }

        .amount {
            font-size: 76px;
            font-weight: 900;
            color: #FFD700;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .text-type {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff; /* White for high contrast against dark bg */
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .message {
            font-size: 24px;
            color: #cccccc; /* Light gray for message */
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* Equalizer */
        .equalizer {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 50px;
            margin-left: auto; /* Push to right */
            padding-right: 20px;
        }

        .eq-bar {
            width: 6px;
            background: #FFD700;
            border-radius: 2px;
            animation: eqWave 1.2s ease-in-out infinite;
            opacity: 0.8;
        }

        .eq-bar:nth-child(1) { height: 30%; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 60%; animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { height: 45%; animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .eq-bar:nth-child(5) { height: 55%; animation-delay: 0.4s; }

        @keyframes eqWave {
            0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Decorative Particles */
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: #FFD700;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
        }

        .alert-container.show .particle {
            animation: particleFloat 1.5s ease-out forwards;
        }

        @keyframes particleFloat {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* Demo Controls */
        .demo-controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px;
            display: flex; gap: 10px; z-index: 1000; border: 1px solid #333;
        }
        .demo-controls button {
            padding: 8px 16px; background: #FFD700; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; color: #000;
        }
    </style>
</head>
<body>
    <div class="alert-container" id="alertBox">
        <!-- Angled Background Layers -->
        <div class="shape-layer outer-border"></div>
        <div class="shape-layer inner-bg"></div>
        <div class="shape-layer inner-lines"></div>
        
        <!-- Particles -->
        <div class="particle" style="top: 50%; left: 50%; --tx: -100px; --ty: -50px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 100px; --ty: -80px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 80px; --ty: 60px;"></div>

        <div class="content">
            <div class="avatar-section">
                <div class="avatar-ring"></div>
                <div class="avatar">
                    <img src="sidd-logo.jpg" alt="Logo">
                </div>
            </div>
            
            <div class="text-section">
                <div class="name" id="name">SIDDHARTH</div>
                <div class="amount-row">
                    <span class="rupee">₹</span>
                    <span class="amount" id="amount">40</span>
                    <span class="text-type" id="textType">TEXT</span>
                </div>
                <div class="message" id="message">"SIDD BHAI VANDAL SKIN REVIEW"</div>
            </div>
            
            <div class="equalizer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>
        </div>
    </div>

    <div class="demo-controls">
        <button onclick="showAlert()">Trigger</button>
        <button onclick="randomAlert()">Random</button>
    </div>

    <script>
        let alertTimeout;
        function showAlert(data = null) {
            const box = document.getElementById('alertBox');
            if (data) updateAlert(data);
            if (alertTimeout) clearTimeout(alertTimeout);
            box.classList.remove('show', 'hide');
            void box.offsetWidth;
            box.classList.add('show');
            alertTimeout = setTimeout(() => hideAlert(), 5000);
        }
        function hideAlert() {
            document.getElementById('alertBox').classList.remove('show');
            document.getElementById('alertBox').classList.add('hide');
        }
        function updateAlert(data) {
            if (data.name) document.getElementById('name').textContent = data.name;
            if (data.amount) document.getElementById('amount').textContent = data.amount;
            if (data.message) document.getElementById('message').textContent = `"${data.message}"`;
            if (data.textType) document.getElementById('textType').textContent = data.textType;
        }
        
        // Initial Trigger
        window.onload = () => setTimeout(showAlert, 500);
        document.addEventListener('keydown', (e) => { if(e.code==='Space') showAlert(); });

        const demos = [
            { name: 'SIDDHARTH', amount: '40', message: 'SIDD BHAI VANDAL SKIN REVIEW', textType: 'TEXT' },
            { name: 'RAJESH', amount: '100', message: 'AWESOME STREAM BRO!', textType: 'DONATION' },
            { name: 'AMIT', amount: '500', message: 'GG WP', textType: 'SUPERCHAT' }
        ];
        function randomAlert() { showAlert(demos[Math.floor(Math.random()*demos.length)]); }
    </script>
</body>
</html>
