<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Alert - Premium Gold & White</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', 'Roboto', Helvetica, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .alert-container {
            position: relative;
            width: 1100px;
            height: 220px;
            /* Darker background for better contrast */
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid #FFD700;
            border-radius: 12px;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .alert-container.show {
            opacity: 1;
            transform: translateX(0);
        }

        .alert-container.hide {
            opacity: 0;
            transform: translateX(-30px);
        }

        /* Subtle tech corners instead of heavy glowing ones */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #FFD700;
            z-index: 10;
        }

        .corner.top-left {
            top: -2px;
            left: 40px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: -2px;
            right: 40px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: -2px;
            left: 40px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: -2px;
            right: 40px;
            border-left: none;
            border-top: none;
        }

        /* Inner subtle border line */
        .inner-line {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 50px;
            gap: 30px;
        }

        /* Avatar section - Cleaner look */
        .avatar-section {
            position: relative;
            width: 150px;
            height: 150px;
            flex-shrink: 0;
        }

        .avatar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #FFD700;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* Rotating dashed ring for tech feel */
        .avatar-ring::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 2px dashed rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #1a1a1a;
            background: #000;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Text section - High Contrast */
        .text-section {
            flex: 1;
        }

        .name {
            font-size: 48px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            /* Pure Gold for Name */
            color: #FFD700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .amount-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .rupee {
            font-size: 36px;
            font-weight: 700;
            color: #FFD700;
        }

        .amount {
            font-size: 60px;
            font-weight: 900;
            color: #FFD700;
            line-height: 1;
            letter-spacing: -1px;
        }

        /* White text for "TEXT" label */
        .text-type {
            font-size: 28px;
            font-weight: 600;
            color: #FFFFFF;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* White text for Message - Much better contrast */
        .message {
            font-size: 22px;
            color: #E0E0E0;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .message span {
            color: #FFD700; /* Highlight the quotes in gold? Or keep white. Let's keep white for clean look. */
        }

        /* Equalizer - Minimalist */
        .equalizer {
            position: absolute;
            right: 40px;
            bottom: 45px;
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 40px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .eq-bar {
            width: 5px;
            background: #FFD700;
            border-radius: 2px;
            animation: eqWave 1s ease-in-out infinite;
        }

        .eq-bar:nth-child(1) { height: 30%; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 60%; animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { height: 40%; animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .eq-bar:nth-child(5) { height: 50%; animation-delay: 0.4s; }

        @keyframes eqWave {
            0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Demo controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            border: 1px solid #333;
        }

        .demo-controls button {
            padding: 8px 16px;
            background: #FFD700;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: #1a1a1a;
        }

        .demo-controls button:hover {
            background: #FFE44D;
        }
    </style>
</head>
<body>
    <div class="alert-container" id="alertBox">
        <div class="inner-line"></div>
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        
        <div class="content">
            <div class="avatar-section">
                <div class="avatar-ring"></div>
                <div class="avatar">
                    <img src="sidd-logo.jpg" alt="Logo" id="avatarImg">
                </div>
            </div>
            
            <div class="text-section">
                <div class="name" id="name">SIDDHARTH</div>
                <div class="amount-row">
                    <span class="rupee">₹</span>
                    <span class="amount" id="amount">40</span>
                    <span class="text-type" id="textType">TEXT</span>
                </div>
                <div class="message" id="message">"SIDD BHAI VANDAL SKIN REVIEW"</div>
            </div>
            
            <div class="equalizer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>
        </div>
    </div>

    <div class="demo-controls">
        <button onclick="showAlert()">Trigger Alert</button>
        <button onclick="randomAlert()">Random</button>
    </div>

    <script>
        let alertTimeout;

        function showAlert(data = null) {
            const alertBox = document.getElementById('alertBox');
            if (data) updateAlert(data);
            
            if (alertTimeout) clearTimeout(alertTimeout);
            
            alertBox.classList.remove('show', 'hide');
            void alertBox.offsetWidth;
            alertBox.classList.add('show');
            
            alertTimeout = setTimeout(() => {
                alertBox.classList.remove('show');
                alertBox.classList.add('hide');
            }, 5000);
        }

        function updateAlert(data) {
            if (data.name) document.getElementById('name').textContent = data.name;
            if (data.amount) document.getElementById('amount').textContent = data.amount;
            if (data.message) document.getElementById('message').textContent = `"${data.message}"`;
            if (data.textType) document.getElementById('textType').textContent = data.textType;
        }

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('trigger')) showAlert();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                showAlert();
            }
        });

        const randoms = [
            { name: 'SIDDHARTH', amount: '40', message: 'SIDD BHAI VANDAL SKIN REVIEW', textType: 'TEXT' },
            { name: 'RAJESH', amount: '100', message: 'AWESOME GAMEPLAY', textType: 'DONATION' },
            { name: 'AMIT', amount: '500', message: 'GG WP BRO', textType: 'SUPERCHAT' }
        ];

        function randomAlert() {
            showAlert(randoms[Math.floor(Math.random() * randoms.length)]);
        }
    </script>
</body>
</html>
