    /* enhanced animations & design system */
    @keyframes alertFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-6px); }
    }
    @keyframes progressAnim {
      0% { width: 12%; }
      50% { width: 82%; }
      100% { width: 12%; }
    }
    @keyframes wavePulse {
      0%, 100% { transform: scaleY(1); opacity: 0.7; }
      50% { transform: scaleY(0.45); opacity: 0.95; }
    }
    @keyframes floatGlow {
      0% { opacity: 0.3; transform: scale(1); }
      100% { opacity: 0.7; transform: scale(1.05); }
    }

      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .animate-float-alert {
      animation: alertFloat 6s ease-in-out infinite;
    }
    .animate-progress {
      animation: progressAnim 4s ease-in-out infinite;
    }
    .animate-wave {
      animation: wavePulse 2.5s ease-in-out infinite;
    }
    .animate-float-glow {
      animation: floatGlow 8s ease-in-out infinite alternate;
    }
    /* subtle scroll reveal refined */
    .reveal-item {
      transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      background: #03030a;

      background-clip: text;
      color: transparent;
    }
    /* panel inner glow */
    .panel-glow {
      position: relative;
    }
    .panel-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 1rem;
      padding: 1px;

      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;

<body class="bg-[#03030a] text-white antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    // ------ IMPROVED DESIGN: smoother icons (emoji + svg-like), consistent shadows, better responsiveness
    const Mic2 = () => <span className="inline-block text-lg drop-shadow-md">🎙️</span>;
    const ShieldCheck = () => <span className="inline-block text-lg">🛡️</span>;

    const Zap = () => <span className="inline-block text-lg drop-shadow-md">⚡</span>;
    const Star = () => <span className="inline-block text-lg drop-shadow-md">⭐</span>;
    
    // Shared primitives with improved glass styling
    const GradText = ({ children }) => (
      <span className="grad-text" style={{ background: "linear-gradient(135deg, #A855F7 15%, #06B6D4 85%)", WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>{children}</span>
    );

    const Panel = ({ children, className = "", accent = "139,92,246", style = {} }) => (
      <div className={`relative rounded-2xl border border-white/[0.08] overflow-hidden backdrop-blur-xl panel-glow glass-card-hover ${className}`} style={{
        background: "radial-gradient(circle at 20% 30%, rgba(10,10,28,0.92), rgba(5,5,15,0.96))",
        backdropFilter: "blur(18px)",
        WebkitBackdropFilter: "blur(18px)",
        boxShadow: `0 25px 45px -20px rgba(${accent},0.3), inset 0 1px 0 rgba(255,255,255,0.05)`,
        ...style
      }}>
        <div aria-hidden className="absolute inset-0 pointer-events-none rounded-2xl" style={{
          backgroundImage: "repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px 1px, transparent 1px 4px)",
        }} />
        {children}
      </div>
    );

    const Tag = ({ children, tone = "muted" }) => {
      const styles = {
        violet: "text-[#D9B8FF] border-[#A855F7]/40 bg-[#A855F7]/[0.12] shadow-sm",
        cyan: "text-[#A5F0FF] border-[#06B6D4]/40 bg-[#06B6D4]/[0.12]",
        coral: "text-[#FFC0CB] border-[#FF4D6D]/40 bg-[#FF4D6D]/[0.12]",
        green: "text-[#A3FFD6] border-[#10B981]/40 bg-[#10B981]/[0.12]",
        muted: "text-white/50 border-white/15 bg-white/[0.05]",
      };
      return <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full border text-[10px] uppercase tracking-[0.2em] font-semibold ${styles[tone]}`}>{children}</span>;
    };

    const StatusDot = ({ color = "#A855F7" }) => (
      <span className="relative inline-flex w-2 h-2 shrink-0">
        <span className="absolute inset-0 rounded-full animate-ping opacity-70" style={{ background: color }} />
        <span className="relative w-2 h-2 rounded-full" style={{ background: color, boxShadow: `0 0 10px ${color}` }} />
      </span>
    );

    // scroll reveal (same logic but smoother)
    function useReveal() {
      const ref = React.useRef(null);
      const [visible, setVisible] = React.useState(false);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { setVisible(true); obs.unobserve(el); }
        }, { threshold: 0.1, rootMargin: "0px 0px -30px 0px" });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return { ref, visible };
    }

    const Reveal = ({ children, delay = 0, className = "" }) => {
      const { ref, visible } = useReveal();
      return (
        <div ref={ref} className={`reveal-item ${className}`} style={{
          opacity: visible ? 1 : 0,
          transform: visible ? "translateY(0)" : "translateY(28px)",
          transition: `opacity 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1) ${delay}ms, transform 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1) ${delay}ms`,
        }}>{children}</div>
      );
    };

    // -------------------- PANELS (improved spacing and micro-interactions) --------------------
    const BroadcastPanel = () => (
      <Panel accent="139,92,246" className="p-7 flex flex-col h-full group">
        <div className="flex items-center justify-between mb-5">
          <div className="flex items-center gap-2"><Tag tone="violet">Realtime engine</Tag><Tag tone="muted">v4.2</Tag></div>
          <div className="flex items-center gap-2 text-[11px] text-white/40 font-mono"><StatusDot color="#10B981" /> live · 14ms p95</div>
        </div>
        <div className="flex items-start gap-4 mb-5">
          <div className="w-11 h-11 rounded-xl grid place-items-center shrink-0 border border-white/20 bg-gradient-to-br from-[#A855F7]/30 to-[#06B6D4]/20 shadow-lg"><Radio /></div>
          <div><h3 className="font-bold text-white text-xl md:text-2xl leading-tight tracking-tight">Broadcast-grade alert orchestration</h3><p className="text-white/40 text-sm mt-2 max-w-[44ch] leading-relaxed">Priority queue, deterministic ordering, zero-flicker delivery into OBS — every event reconciled through one realtime spine.</p></div>
        </div>
        <div className="mt-auto">
          <div className="rounded-xl border border-white/[0.08] overflow-hidden relative shadow-2xl" style={{ background: "linear-gradient(145deg, #0a0a14 0%, #020208 100%)", aspectRatio: "16/9" }}>
            <div aria-hidden className="absolute inset-0 pointer-events-none" style={{ background: "radial-gradient(ellipse at 25% 35%, rgba(168,85,247,0.2), transparent 65%), radial-gradient(ellipse at 80% 70%, rgba(6,182,212,0.12), transparent 55%)" }} />
            <div className="absolute top-2 left-2.5 flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-[#FF4D6D]/80" /><span className="w-2 h-2 rounded-full bg-[#FF7A00]/80" /><span className="w-2 h-2 rounded-full bg-[#10B981]/80" /></div>
            <div className="absolute top-2 right-3 text-[9px] font-mono text-white/40 uppercase tracking-[0.2em]">OBS · scene 03</div>
            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 w-[84%] rounded-xl border border-[#A855F7]/40 px-4 py-3 bg-gradient-to-r from-[#120c24]/95 to-[#0c081c]/95 shadow-2xl backdrop-blur-sm animate-float-alert">
              <div className="flex items-center gap-2.5"><div className="w-8 h-8 rounded-lg grid place-items-center text-[11px] font-bold text-white bg-gradient-to-br from-[#A855F7] to-[#06B6D4] shadow-md">AK</div><div className="flex-1 min-w-0"><div className="text-[11px] font-semibold text-white truncate">AsphaltKing donated <span className="text-[#C084FC]">₹2,500</span></div><div className="text-[10px] text-white/50 truncate font-mono mt-0.5">"Insane play! Take this 🔥"</div></div><div className="text-[10px] text-[#34D399] font-mono whitespace-nowrap drop-shadow">▶ playing</div></div>
              <div className="mt-2 h-[3px] rounded-full bg-white/15 overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-[#A855F7] to-[#06B6D4] shadow-[0_0_8px_#A855F7] animate-progress" /></div>
            </div>
          </div>
          <div className="mt-4 grid grid-cols-3 gap-2">
            {[{ t: "12:04:18", e: "alert.queued", c: "#A855F7" },{ t: "12:04:18", e: "tts.synth.ok", c: "#06B6D4" },{ t: "12:04:19", e: "obs.render", c: "#10B981" }].map((row) => (<div key={row.e} className="flex items-center gap-1.5 px-2 py-1.5 rounded-lg bg-white/[0.03] border border-white/[0.06] font-mono text-[9px]"><span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ background: row.c, boxShadow: `0 0 4px ${row.c}` }} /><span className="text-white/35">{row.t}</span><span className="text-white/70 truncate">{row.e}</span></div>))}
          </div>
        </div>
      </Panel>
    );

    const VoicePanel = () => {
      const bars = Array.from({ length: 44 }, (_, i) => ({ h: Math.min(22 + Math.abs(Math.sin(i * 0.55) * 68) + (i % 5 === 0 ? 14 : 0), 96), grad: i % 3 === 0, dim: i >= 29, delay: i * 0.06 }));
      return (
        <Panel accent="6,182,212" className="p-6 flex flex-col h-full">
          <div className="flex items-center justify-between mb-3"><Tag tone="cyan">AI voice</Tag><span className="font-mono text-[10px] text-white/40">8 voices · 12 langs</span></div>
          <div className="flex items-center gap-3 mb-3"><div className="w-9 h-9 rounded-lg grid place-items-center border border-white/15 bg-gradient-to-br from-[#06B6D4]/20 to-[#A855F7]/15"><Mic2 /></div><div><div className="text-sm font-semibold text-white tracking-tight">Voice synthesis</div><div className="text-[11px] text-white/40 mt-0.5">Tiered MiniMax · sub-second</div></div></div>
          <div className="mt-auto flex items-center gap-[2px] h-16">{bars.map((b, i) => (<span key={i} className="flex-1 rounded-full transition-all duration-300" style={{ height: `${b.h}%`, background: b.grad ? "linear-gradient(180deg, #22D3EE, #C084FC)" : "rgba(34,211,238,0.6)", opacity: b.dim ? 0.25 : 0.9, animation: `wavePulse 2.4s ease-in-out ${b.delay}s infinite` }} />))}</div>

    const AnalyticsPanel = () => {
      const bars = [42, 58, 52, 76, 64, 90, 74, 98, 84, 114, 96, 135];
      return (
        <Panel accent="139,92,246" className="p-6 flex flex-col h-full">
          <div className="flex items-center justify-between mb-3"><Tag tone="violet">Analytics</Tag><div className="flex items-center gap-1 font-mono text-[10px] text-[#34D399]"><Activity /> +18.4%</div></div>
          <div className="text-2xl font-bold tracking-tight text-white">₹4.82L</div><div className="text-[11px] text-white/40 font-mono mb-3">last 7 days</div>
          <div className="flex items-end gap-1.5 h-[72px]">{bars.map((h, i) => (<div key={i} className="flex-1 rounded-t-md transition-all duration-300 hover:opacity-80" style={{ height: `${(h / 135) * 100}%`, background: i === bars.length-1 ? "linear-gradient(180deg, #C084FC, #22D3EE)" : "rgba(168,85,247,0.35)", boxShadow: i === bars.length-1 ? "0 0 12px rgba(168,85,247,0.5)" : "none" }} />))}</div>

        <div className="mt-auto space-y-2.5">{[{ label: "Approved", val: "98.4%", color: "#10B981", w: "98%" },{ label: "Pending", val: "1.1%", color: "#FF9F1C", w: "10%" },{ label: "Flagged", val: "0.5%", color: "#FF4D6D", w: "5%" }].map((r) => (<div key={r.label} className="flex items-center gap-2.5 text-[11px]"><span className="w-14 text-white/60 shrink-0">{r.label}</span><div className="flex-1 h-1.5 rounded-full bg-white/[0.08] overflow-hidden"><div className="h-full rounded-full" style={{ width: r.w, background: r.color, boxShadow: `0 0 6px ${r.color}` }} /></div><span className="font-mono text-white/80 w-10 text-right">{r.val}</span></div>))}</div>
      </Panel>
    );

    const PipelinePanel = () => (
      <Panel accent="6,182,212" className="p-6 flex flex-col h-full">
        <div className="flex items-center justify-between mb-3"><Tag tone="cyan">Priority pipeline</Tag><Zap /></div>
        <div className="text-sm font-semibold text-white mb-1">Tier-aware media routing</div><div className="text-[11px] text-white/40 mb-4">Hyperemote → Voice → Text, buffer-aware.</div>
        <div className="mt-auto space-y-2">{[{ name: "Hyperemote", lv: "P0", color: "#FF4D6D" },{ name: "Voice", lv: "P1", color: "#A855F7" },{ name: "Text", lv: "P2", color: "#06B6D4" }].map((p) => (<div key={p.name} className="flex items-center justify-between px-3 py-2 rounded-xl bg-white/[0.03] border border-white/[0.06] transition-all hover:bg-white/[0.06]"><div className="flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full" style={{ background: p.color, boxShadow: `0 0 8px ${p.color}` }} /><span className="text-[12px] text-white/85">{p.name}</span></div><span className="font-mono text-[10px] text-white/50">{p.lv}</span></div>))}</div>

      return (
        <section className="py-28 relative z-10" style={{ background: "radial-gradient(ellipse at 50% 0%, rgba(168,85,247,0.08), transparent 70%)", borderTop: "1px solid rgba(255,255,255,0.04)", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
          <div className="container mx-auto px-4 md:px-10">
            <Reveal><div className="mb-2"><div className="inline-flex items-center gap-2 px-3 py-1 rounded-full text-[11px] uppercase tracking-[0.2em] text-white/70 border border-white/15 bg-white/[0.04] font-mono mb-4"><Star /> XP economy</div></div><h2 className="text-4xl md:text-5xl font-bold tracking-tight leading-[1.08] mb-3">Viewers earn. <GradText>Creators win.</GradText></h2><p className="text-white/50 text-base max-w-md leading-relaxed font-light">Every rupee donated fuels the XP flywheel — points earned, rewards redeemed, retention compounded.</p></Reveal>
            <Reveal delay={100}><div className="flex items-center mt-12 mb-12 overflow-x-auto pb-3 gap-0 scrollbar-thin">{flow.map((node, i) => (<React.Fragment key={node.label}><div className="flex-shrink-0 px-5 py-3 rounded-xl border backdrop-blur-md text-center min-w-[110px] transition-all hover:scale-[1.02]" style={{ background: node.accent ?? "rgba(12,12,24,0.9)", borderColor: node.border ?? "rgba(255,255,255,0.12)" }}><div className="text-[12px] font-semibold" style={{ color: node.textColor ?? "rgba(255,255,255,0.85)" }}>{node.label}</div><div className="text-[10px] text-white/40 font-mono mt-1">{node.sub}</div></div>{i < flow.length-1 && (<div className="flex-shrink-0 relative w-8 h-[2px] bg-gradient-to-r from-[#A855F7]/60 to-[#06B6D4]/60"><div className="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 rotate-45 border-t-2 border-r-2 border-[#06B6D4]/70" /></div>)}</React.Fragment>))}</div></Reveal>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">{econCards.map((c, i) => (<Reveal key={c.val} delay={i*80}><div className="rounded-2xl p-5 text-center backdrop-blur-sm transition-all hover:-translate-y-1 duration-300" style={{ background: "rgba(8,8,18,0.85)", border: `1px solid ${c.border}`, boxShadow: "0 8px 20px -8px rgba(0,0,0,0.5)" }}><div className="text-2xl mb-3 drop-shadow">{c.icon}</div><div className="text-3xl font-bold tracking-tight leading-none mb-2 grad-text" style={{ background: `linear-gradient(135deg, ${c.grad})`, WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>{c.val}</div><div className="text-[11px] text-white/45 font-mono">{c.label}</div></div></Reveal>))}</div>
          </div>
        </section>
      );
    };

    // MAIN ECOSYSTEM (updated design with floating orbs & refined spacing)
    const EcosystemShowcase = () => (
      <>
        {/* floating background accent */}
        <div className="fixed inset-0 pointer-events-none overflow-hidden -z-10">
          <div className="absolute top-[15%] left-[5%] w-[500px] h-[500px] rounded-full bg-[#A855F7]/5 blur-[120px] animate-float-glow" />
          <div className="absolute bottom-[10%] right-[0%] w-[600px] h-[600px] rounded-full bg-[#06B6D4]/5 blur-[140px] animate-float-glow" style={{ animationDelay: "-3s" }} />
        </div>
        <section id="ecosystem" className="relative py-28 md:py-36 overflow-hidden">
          <div className="container mx-auto px-4 md:px-10 relative z-10">
            <Reveal><div className="mb-12"><div className="inline-flex items-center gap-2 px-3 py-1 rounded-full text-[11px] uppercase tracking-[0.22em] text-white/70 border border-white/15 bg-white/[0.04] font-mono mb-5"><StatusDot /> The platform</div><h2 className="text-4xl md:text-[54px] font-bold tracking-tight leading-[1.08] mb-4">One realtime layer for <GradText>every interaction</GradText>.</h2><p className="text-white/50 text-base md:text-lg max-w-lg font-light">Six engines, one event bus — engineered for live broadcast tempo.</p></div></Reveal>
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 auto-rows-fr">
              <Reveal className="lg:col-span-7 lg:row-span-2"><BroadcastPanel /></Reveal>
              <Reveal delay={100} className="lg:col-span-5"><VoicePanel /></Reveal>
              <Reveal delay={150} className="lg:col-span-5"><AnalyticsPanel /></Reveal>
              <Reveal delay={50} className="lg:col-span-4"><ModerationPanel /></Reveal>
              <Reveal delay={100} className="lg:col-span-4"><PipelinePanel /></Reveal>
              <Reveal delay={150} className="lg:col-span-4"><IntegrationsPanel /></Reveal>
            </div>
            <div className="mt-14 flex flex-wrap items-center justify-center gap-x-10 gap-y-3 text-[10px] font-mono text-white/40 uppercase tracking-[0.25em]">{["Edge-deployed", "Sub-second delivery", "Idempotent event bus", "HMAC-signed pipeline"].map((t) => (<span key={t} className="flex items-center gap-1"><span className="w-1 h-1 rounded-full bg-white/40" /> {t}</span>))}</div>
          </div>
        </section>
        <XpEconomy />
      </>
    );

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<EcosystemShowcase />);
  </script>
</body>
</html>
