<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Alert - Premium Gold</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Arial Black', 'Segoe UI Black', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .alert-container {
            position: relative;
            width: 1200px;
            height: 240px;
            opacity: 0;
            transform: translateX(-50px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .alert-container.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .alert-container.hide {
            opacity: 0;
            transform: translateX(-50px) scale(0.95);
        }

        /* Outer frame border */
        .outer-frame {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid #FFD700;
            border-radius: 20px;
            box-shadow: 
                0 0 15px rgba(255, 215, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.3),
                inset 0 0 15px rgba(255, 215, 0, 0.2);
        }

        /* Inner frame border */
        .inner-frame {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 2px solid #FFD700;
            border-radius: 16px;
            box-shadow: 
                0 0 10px rgba(255, 215, 0, 0.4),
                inset 0 0 10px rgba(255, 215, 0, 0.1);
        }

        /* Corner accents - angular cuts */
        .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid #FFD700;
            z-index: 10;
        }

        .corner.top-left {
            top: 2px;
            left: 60px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 18px;
            box-shadow: -2px -2px 10px rgba(255, 215, 0, 0.5);
        }

        .corner.top-right {
            top: 2px;
            right: 60px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: 18px;
            box-shadow: 2px -2px 10px rgba(255, 215, 0, 0.5);
        }

        .corner.bottom-left {
            bottom: 2px;
            left: 60px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: 18px;
            box-shadow: -2px 2px 10px rgba(255, 215, 0, 0.5);
        }

        .corner.bottom-right {
            bottom: 2px;
            right: 60px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 18px;
            box-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5);
        }

        /* Top and bottom accent lines */
        .accent-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            opacity: 0.8;
        }

        .accent-line.top {
            top: 30px;
            left: 100px;
            right: 100px;
        }

        .accent-line.bottom {
            bottom: 30px;
            left: 100px;
            right: 100px;
        }

        .content {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 60px;
        }

        /* Avatar section */
        .avatar-section {
            position: relative;
            width: 160px;
            height: 160px;
            margin-right: 40px;
            flex-shrink: 0;
        }

        .avatar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #FFD700;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            padding: 5px;
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.7),
                0 0 40px rgba(255, 215, 0, 0.4),
                inset 0 0 20px rgba(255, 215, 0, 0.5);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-ring::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid transparent;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        /* Text section */
        .text-section {
            flex: 1;
            color: #FFD700;
        }

        .name {
            font-size: 52px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.5),
                0 0 30px rgba(255, 215, 0, 0.3);
            background: linear-gradient(135deg, #FFD700 0%, #FFE44D 50%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
            }
            50% { 
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 1));
            }
        }

        .amount-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;
        }

        .rupee {
            font-size: 42px;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        .amount {
            font-size: 72px;
            font-weight: 900;
            color: #FFD700;
            line-height: 1;
            text-shadow: 
                0 0 15px rgba(255, 215, 0, 0.8),
                0 0 30px rgba(255, 215, 0, 0.4);
        }

        .text-type {
            font-size: 36px;
            font-weight: 700;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        .message {
            font-size: 24px;
            color: #FFE44D;
            letter-spacing: 2px;
            text-shadow: 
                0 0 10px rgba(255, 228, 77, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Equalizer icon */
        .equalizer {
            position: absolute;
            right: 80px;
            bottom: 60px;
            display: flex;
            gap: 5px;
            align-items: flex-end;
            height: 50px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .eq-bar {
            width: 7px;
            background: linear-gradient(to top, #FFD700, #FFE44D);
            border-radius: 3px;
            animation: eqWave 1.2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }

        .eq-bar:nth-child(1) { height: 30%; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 60%; animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { height: 45%; animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .eq-bar:nth-child(5) { height: 55%; animation-delay: 0.4s; }
        .eq-bar:nth-child(6) { height: 70%; animation-delay: 0.5s; }

        @keyframes eqWave {
            0%, 100% { 
                transform: scaleY(0.4); 
                opacity: 0.6; 
            }
            50% { 
                transform: scaleY(1); 
                opacity: 1; 
            }
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #FFD700;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .alert-container.show .particle {
            animation: particleFloat 1.5s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* Glowing edge effects */
        .glow-edge {
            position: absolute;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, transparent);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .glow-edge.top-left {
            top: -3px;
            left: 10px;
            transform: rotate(-45deg);
        }

        .glow-edge.top-right {
            top: -3px;
            right: 10px;
            transform: rotate(45deg);
        }

        .glow-edge.bottom-left {
            bottom: -3px;
            left: 10px;
            transform: rotate(45deg);
        }

        .glow-edge.bottom-right {
            bottom: -3px;
            right: 10px;
            transform: rotate(-45deg);
        }

        /* Demo controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            border: 2px solid #FFD700;
        }

        .demo-controls button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 900;
            font-size: 14px;
            color: #1a1a1a;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="alert-container" id="alertBox">
        <!-- Frames -->
        <div class="outer-frame"></div>
        <div class="inner-frame"></div>
        
        <!-- Corners -->
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        
        <!-- Accent lines -->
        <div class="accent-line top"></div>
        <div class="accent-line bottom"></div>
        
        <!-- Glow edges -->
        <div class="glow-edge top-left"></div>
        <div class="glow-edge top-right"></div>
        <div class="glow-edge bottom-left"></div>
        <div class="glow-edge bottom-right"></div>
        
        <!-- Particles -->
        <div class="particle" style="top: 50%; left: 50%; --tx: -120px; --ty: -60px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 120px; --ty: -80px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 100px; --ty: 70px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: -100px; --ty: 80px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 0px; --ty: -100px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: -60px; --ty: -90px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 80px; --ty: -50px;"></div>
        
        <div class="content">
            <!-- Avatar -->
            <div class="avatar-section">
                <div class="avatar-ring"></div>
                <div class="avatar">
                    <img src="sidd-logo.jpg" alt="Sidd Logo" id="avatarImg">
                </div>
            </div>
            
            <!-- Text -->
            <div class="text-section">
                <div class="name" id="name">SIDDHARTH</div>
                <div class="amount-row">
                    <span class="rupee">₹</span>
                    <span class="amount" id="amount">40</span>
                    <span class="text-type" id="textType">TEXT</span>
                </div>
                <div class="message" id="message">"SIDD BHAI VANDAL SKIN REVIEW"</div>
            </div>
            
            <!-- Equalizer -->
            <div class="equalizer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>
        </div>
    </div>

    <!-- Demo Controls -->
    <div class="demo-controls">
        <button onclick="showAlert()">🎉 Show Alert</button>
        <button onclick="hideAlert()"> Hide</button>
        <button onclick="randomAlert()">🎲 Random</button>
    </div>

    <script>
        let alertTimeout;

        function showAlert(data = null) {
            const alertBox = document.getElementById('alertBox');
            
            if (data) {
                updateAlert(data);
            }
            
            if (alertTimeout) clearTimeout(alertTimeout);
            
            alertBox.classList.remove('show', 'hide');
            void alertBox.offsetWidth;
            alertBox.classList.add('show');
            
            alertTimeout = setTimeout(() => {
                hideAlert();
            }, 6000);
        }

        function hideAlert() {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.remove('show');
            alertBox.classList.add('hide');
        }

        function updateAlert(data) {
            if (data.name) document.getElementById('name').textContent = data.name;
            if (data.amount) document.getElementById('amount').textContent = data.amount;
            if (data.message) document.getElementById('message').textContent = `"${data.message}"`;
            if (data.textType) document.getElementById('textType').textContent = data.textType;
            if (data.avatar) document.getElementById('avatarImg').src = data.avatar;
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'alert') {
                showAlert(event.data);
            }
        });

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('trigger')) {
                showAlert({
                    name: params.get('name') || 'SIDDHARTH',
                    amount: params.get('amount') || '40',
                    message: params.get('message') || 'SIDD BHAI VANDAL SKIN REVIEW',
                    textType: params.get('type') || 'TEXT'
                });
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                showAlert();
            }
            if (e.code === 'Escape') hideAlert();
        });

        const demoData = [
            { name: 'SIDDHARTH', amount: '40', message: 'SIDD BHAI VANDAL SKIN REVIEW', textType: 'TEXT' },
            { name: 'RAJESH', amount: '100', message: 'AWESOME STREAM BRO!', textType: 'DONATION' },
            { name: 'PRIYA', amount: '500', message: 'LOVE YOUR CONTENT! 🔥', textType: 'SUPERCHAT' }
        ];

        function randomAlert() {
            showAlert(demoData[Math.floor(Math.random() * demoData.length)]);
        }
    </script>
</body>
</html>
