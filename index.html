<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Alert - Siddharth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert-box {
            position: relative;
            width: 900px;
            height: 200px;
            background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            border: 3px solid #FFD700;
            border-radius: 10px;
            opacity: 0;
            transform: translateX(-100%) scale(0.9);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3),
                        inset 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .alert-box.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .alert-box.hide {
            opacity: 0;
            transform: translateX(-100%) scale(0.9);
        }

        /* Animated border glow */
        .alert-box::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #FF8C00, #FFD700);
            background-size: 400% 400%;
            border-radius: 10px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s;
            animation: gradientShift 3s ease infinite;
        }

        .alert-box.active::before {
            opacity: 1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid #FFD700;
            z-index: 10;
        }

        .corner.top-left {
            top: -3px;
            left: 100px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 10px;
        }

        .corner.top-right {
            top: -3px;
            right: 100px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: 10px;
        }

        .corner.bottom-left {
            bottom: -3px;
            left: 100px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: 10px;
        }

        .corner.bottom-right {
            bottom: -3px;
            right: 100px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 10px;
        }

        /* Top and bottom border lines */
        .border-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            opacity: 0.6;
        }

        .border-line.top {
            top: 20px;
            left: 150px;
            right: 150px;
        }

        .border-line.bottom {
            bottom: 20px;
            left: 150px;
            right: 150px;
        }

        .content {
            display: flex;
            align-items: center;
            padding: 20px 50px;
            height: 100%;
            position: relative;
            z-index: 5;
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin-right: 35px;
            flex-shrink: 0;
        }

        .avatar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #FFD700;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            padding: 5px;
            animation: rotate 10s linear infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5),
                        inset 0 0 20px rgba(255, 215, 0, 0.3);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-ring::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #1e1e1e;
            overflow: hidden;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .alert-box.show .avatar img {
            animation: avatarPop 0.6s ease-out 0.3s;
        }

        @keyframes avatarPop {
            0% { transform: scale(0) rotate(-180deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .text-section {
            flex: 1;
            color: #FFD700;
        }

        .name {
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6),
                         0 0 40px rgba(255, 215, 0, 0.3);
            animation: textGlow 2s ease-in-out infinite;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes textGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            }
            50% { 
                filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.9));
            }
        }

        .amount-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 20px;
        }

        .rupee {
            font-size: 40px;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: slideIn 0.6s ease-out 0.5s both;
        }

        .amount {
            font-size: 64px;
            font-weight: 900;
            color: #FFD700;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: slideIn 0.6s ease-out 0.6s both, numberPulse 2s ease-in-out infinite 1s;
        }

        .text-type {
            font-size: 32px;
            font-weight: 700;
            color: #FFA500;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: slideIn 0.6s ease-out 0.7s both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes numberPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .message {
            font-size: 22px;
            color: #d4af37;
            font-style: italic;
            letter-spacing: 1.5px;
            padding-left: 5px;
            border-left: 4px solid #FFD700;
            padding-left: 15px;
            opacity: 0.9;
            animation: fadeIn 0.6s ease-out 0.8s both;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 0.9;
                transform: translateY(0);
            }
        }

        .sound-icon {
            position: absolute;
            right: 50px;
            bottom: 50px;
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 40px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.9s forwards;
        }

        .sound-bar {
            width: 6px;
            background: linear-gradient(to top, #FFD700, #FFA500);
            border-radius: 3px;
            animation: soundWave 1.2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .sound-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
        .sound-bar:nth-child(2) { height: 70%; animation-delay: 0.1s; }
        .sound-bar:nth-child(3) { height: 50%; animation-delay: 0.2s; }
        .sound-bar:nth-child(4) { height: 90%; animation-delay: 0.3s; }
        .sound-bar:nth-child(5) { height: 60%; animation-delay: 0.4s; }

        @keyframes soundWave {
            0%, 100% { 
                transform: scaleY(0.5); 
                opacity: 0.5; 
            }
            50% { 
                transform: scaleY(1); 
                opacity: 1; 
            }
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #FFD700;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .alert-box.show .particle {
            animation: particleFloat 1.5s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* Demo controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            border: 2px solid #FFD700;
        }

        .demo-controls button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            color: #1e1e1e;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .demo-controls button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="alert-box" id="alertBox">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        
        <div class="border-line top"></div>
        <div class="border-line bottom"></div>
        
        <!-- Particles -->
        <div class="particle" style="top: 50%; left: 50%; --tx: -100px; --ty: -50px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 100px; --ty: -80px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 80px; --ty: 60px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: -80px; --ty: 80px;"></div>
        <div class="particle" style="top: 50%; left: 50%; --tx: 0px; --ty: -100px;"></div>
        
        <div class="content">
            <div class="avatar-container">
                <div class="avatar-ring"></div>
                <div class="avatar">
                    <img src="sidd-logo.jpg" alt="Siddharth Logo" id="avatarImg">
                </div>
            </div>
            
            <div class="text-section">
                <div class="name" id="name">SIDDHARTH</div>
                <div class="amount-row">
                    <span class="rupee">₹</span>
                    <span class="amount" id="amount">40</span>
                    <span class="text-type" id="textType">TEXT</span>
                </div>
                <div class="message" id="message">"SIDD BHAI VANDAL SKIN REVIEW"</div>
            </div>
            
            <div class="sound-icon">
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
            </div>
        </div>
    </div>

    <div class="demo-controls">
        <button onclick="showAlert()">🎉 Show Alert</button>
        <button onclick="hideAlert()">✕ Hide</button>
    </div>

    <script>
        let alertTimeout;

        function showAlert(data = null) {
            const alertBox = document.getElementById('alertBox');
            
            if (data) {
                updateAlert(data);
            }
            
            // Clear existing timeout
            if (alertTimeout) {
                clearTimeout(alertTimeout);
            }
            
            // Reset animation
            alertBox.classList.remove('show', 'hide');
            void alertBox.offsetWidth; // Trigger reflow
            
            // Show alert
            alertBox.classList.add('show', 'active');
            
            // Auto hide after 6 seconds
            alertTimeout = setTimeout(() => {
                hideAlert();
            }, 6000);
        }

        function hideAlert() {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.remove('show', 'active');
            alertBox.classList.add('hide');
        }

        function updateAlert(data) {
            if (data.name) document.getElementById('name').textContent = data.name;
            if (data.amount) document.getElementById('amount').textContent = data.amount;
            if (data.message) document.getElementById('message').textContent = `"${data.message}"`;
            if (data.textType) document.getElementById('textType').textContent = data.textType;
            if (data.avatar) document.getElementById('avatarImg').src = data.avatar;
        }

        // Listen for messages from Streamlabs/StreamElements
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'alert') {
                showAlert(event.data);
            }
        });

        // URL parameter support for testing
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('trigger')) {
                showAlert({
                    name: params.get('name') || 'SIDDHARTH',
                    amount: params.get('amount') || '40',
                    message: params.get('message') || 'SIDD BHAI VANDAL SKIN REVIEW',
                    textType: params.get('type') || 'TEXT'
                });
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                showAlert();
            }
            if (e.code === 'Escape') {
                hideAlert();
            }
        });

        // Random demo data
        const demoData = [
            { name: 'SIDDHARTH', amount: '40', message: 'SIDD BHAI VANDAL SKIN REVIEW', textType: 'TEXT' },
            { name: 'RAJESH KUMAR', amount: '100', message: 'Awesome stream bro! Keep it up!', textType: 'DONATION' },
            { name: 'PRIYA SHARMA', amount: '500', message: 'Love your content! 🔥', textType: 'SUPERCHAT' },
            { name: 'ARJUN SINGH', amount: '250', message: 'Best gaming stream ever!', textType: 'DONATION' }
        ];

        function randomAlert() {
            const random = demoData[Math.floor(Math.random() * demoData.length)];
            showAlert(random);
        }

        // Add random alert button functionality
        document.querySelector('.demo-controls').innerHTML += 
            '<button onclick="randomAlert()">🎲 Random</button>';
    </script>
</body>
</html>
