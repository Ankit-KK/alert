<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SIDDHARTH | Cyber Gold Donation Alert — OBS Ready</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* cleaner overlay behavior */
    }

    /* FULLY TRANSPARENT BACKGROUND – no grey panel, no solid rectangle, no inner layer */
    body, html {
      background: transparent;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', 'Rajdhani', 'Poppins', 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* ========= MAIN ALERT CONTAINER – ultra-wide, premium gold frame (enhanced) ========= */
    .donation-alert {
      position: relative;
      width: 1080px;
      max-width: 92vw;
      min-width: 860px;
      background: transparent; /* CRITICAL: fully transparent background */
      border: 2.5px solid rgba(255, 210, 50, 1);
      border-radius: 32px;
      /* cinematic gold glow + layered depth */
      box-shadow: 0 0 18px rgba(255, 190, 30, 0.9), 0 0 32px rgba(255, 160, 20, 0.5), inset 0 0 12px rgba(255, 215, 0, 0.35);
      transition: all 0.25s ease;
      backdrop-filter: none;
      overflow: visible;
      padding: 18px 28px 18px 24px;
    }

    /* enhanced corner design language – futuristic cyber brackets (double layered) */
    .donation-alert::before,
    .donation-alert::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: #FFD966;
      border-style: solid;
      filter: drop-shadow(0 0 6px #ffaa44);
      pointer-events: none;
    }
    .donation-alert::before {
      top: -2px;
      left: -2px;
      border-width: 4px 0 0 4px;
      border-radius: 12px 0 0 0;
    }
    .donation-alert::after {
      bottom: -2px;
      right: -2px;
      border-width: 0 4px 4px 0;
      border-radius: 0 0 12px 0;
    }
    /* additional corner accents for premium symmetry */
    .donation-alert .corner-accent {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: #FFE484;
      border-style: solid;
      filter: drop-shadow(0 0 5px #ffbb44);
      pointer-events: none;
    }
    .donation-alert .corner-accent-1 {
      top: -2px;
      right: -2px;
      border-width: 0 4px 4px 0;
      border-radius: 0 0 12px 0;
    }
    .donation-alert .corner-accent-2 {
      bottom: -2px;
      left: -2px;
      border-width: 4px 0 0 4px;
      border-radius: 12px 0 0 0;
    }
    /* inner glowing edge (no background) */
    .donation-alert .glow-inner {
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      bottom: 4px;
      border-radius: 28px;
      border: 1px solid rgba(255, 200, 70, 0.6);
      box-shadow: inset 0 0 16px rgba(255, 190, 0, 0.4);
      pointer-events: none;
      background: transparent;
    }

    /* FLEX LAYOUT: mascot | text block (vertical hierarchy) | equalizer */
    .alert-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      width: 100%;
      background: transparent;
      position: relative;
      z-index: 3;
    }

    /* ========= MASCOT (avatar) – exact scale, premium ring glow ========= */
    .mascot-wrapper {
      flex-shrink: 0;
      position: relative;
      filter: drop-shadow(0 0 14px #ffbb44);
    }
    /* holographic ring behind avatar (glowing cyber effect, no background) */
    .mascot-wrapper::before {
      content: '';
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,200,50,0.3), transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: pulseRing 2s infinite alternate;
    }
    @keyframes pulseRing {
      0% { opacity: 0.4; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1.08); box-shadow: 0 0 28px #ffcc55; }
    }
    .mascot-img {
      width: 96px;
      height: 96px;
      object-fit: cover;
      border-radius: 50%;
      border: 2.5px solid #FFD966;
      box-shadow: 0 0 22px rgba(255, 200, 0, 0.9), inset 0 0 8px rgba(255, 220, 100, 0.7);
      background: transparent;
      display: block;
      transition: transform 0.2s;
    }

    /* ========= TEXT AREA – exact vertical hierarchy from reference ========= */
    .alert-text {
      flex: 1;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 12px;
    }
    /* username line */
    .username {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(145deg, #FFEDB0 0%, #FFC364 40%, #FFA51E 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 14px rgba(255, 190, 50, 0.8);
      font-family: 'Orbitron', 'Rajdhani', monospace;
      line-height: 1.2;
    }
    /* amount line (₹40) */
    .amount {
      font-size: 38px;
      font-weight: 800;
      background: linear-gradient(135deg, #FFDF88, #FFB845);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 16px rgba(255, 170, 0, 0.9);
      letter-spacing: 1px;
      font-family: 'Orbitron', monospace;
      margin-top: -2px;
    }
    /* "TEXT" label line – distinct cyber style */
    .text-label {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #FFE6B3;
      text-transform: uppercase;
      text-shadow: 0 0 8px #ffaa44, 0 0 2px #ffcc66;
      background: transparent;
      display: inline-block;
      margin-top: 4px;
      font-family: 'Rajdhani', monospace;
      border-left: 3px solid #FFD966;
      padding-left: 14px;
    }
    /* quoted message – exact text */
    .message-quote {
      font-size: 24px;
      font-weight: 600;
      color: #FFF6E0;
      text-shadow: 0 0 12px #FFB347, 0 1px 2px rgba(0,0,0,0.2);
      letter-spacing: 0.4px;
      font-family: 'Poppins', 'Orbitron', sans-serif;
      background: transparent;
      font-style: normal;
      word-break: break-word;
    }
    /* wrap spacing for narrow view */
    @media (max-width: 950px) {
      .username { font-size: 32px; }
      .amount { font-size: 28px; }
      .message-quote { font-size: 18px; }
      .text-label { font-size: 15px; }
      .donation-alert { min-width: 680px; padding: 14px 20px; }
      .mascot-img { width: 78px; height: 78px; }
    }

    /* ========= GLOWING EQUALIZER – cyber audio visualizer, refined animation ========= */
    .equalizer-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: transparent;
      padding-left: 12px;
      margin-left: 4px;
      filter: drop-shadow(0 0 8px #ffbc3c);
    }
    .eq-bar {
      width: 6px;
      background: linear-gradient(to top, #FFD966, #FFAA33, #FFE484);
      border-radius: 4px;
      box-shadow: 0 0 12px #ffb347, 0 0 3px #ffdd88;
      transition: height 0.18s ease;
      animation: cyberPulse 1.3s infinite ease-in-out alternate;
      transform-origin: bottom;
    }
    /* unique bar heights + varied animations for realistic equalizer */
    .eq-bar:nth-child(1) { height: 20px; animation-duration: 0.9s; }
    .eq-bar:nth-child(2) { height: 36px; animation-duration: 1.2s; animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { height: 28px; animation-duration: 0.8s; animation-delay: 0.2s; }
    .eq-bar:nth-child(4) { height: 48px; animation-duration: 1.4s; animation-delay: 0.05s; }
    .eq-bar:nth-child(5) { height: 24px; animation-duration: 1s; animation-delay: 0.3s; }
    .eq-bar:nth-child(6) { height: 40px; animation-duration: 1.25s; animation-delay: 0.15s; }
    .eq-bar:nth-child(7) { height: 30px; animation-duration: 1.1s; animation-delay: 0.25s; }

    @keyframes cyberPulse {
      0% { height: 12px; opacity: 0.8; filter: brightness(0.9); }
      100% { height: 52px; opacity: 1; filter: brightness(1.3) drop-shadow(0 0 6px gold); }
    }

    /* ========= FLOATING PARTICLES & GLOW EFFECTS (premium energy) ========= */
    .particle-field {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }
    .particle {
      position: absolute;
      background: radial-gradient(circle, #FFE484, #FFB347);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      opacity: 0;
      filter: blur(0.8px);
      animation: driftGlow 5s infinite ease-in-out;
      box-shadow: 0 0 10px #ffcc55;
    }
    /* dynamic particle placement for cyber dust */
    .particle:nth-child(1) { top: 12%; left: 7%; animation-delay: 0s; width: 6px; height: 6px; }
    .particle:nth-child(2) { top: 78%; left: 94%; animation-delay: 0.8s; width: 4px; height: 4px; }
    .particle:nth-child(3) { top: 35%; left: 18%; animation-delay: 1.5s; width: 7px; height: 7px; background: #FFD966; }
    .particle:nth-child(4) { top: 88%; left: 42%; animation-delay: 0.5s; width: 5px; height: 5px; }
    .particle:nth-child(5) { top: 22%; left: 72%; animation-delay: 2.2s; width: 5px; height: 5px; }
    .particle:nth-child(6) { top: 65%; left: 12%; animation-delay: 1.9s; width: 4px; height: 4px; }
    .particle:nth-child(7) { top: 8%; left: 52%; animation-delay: 3s; width: 6px; height: 6px; }
    .particle:nth-child(8) { top: 92%; left: 76%; animation-delay: 2.5s; width: 5px; height: 5px; filter: blur(1px);}
    .particle:nth-child(9) { top: 48%; left: 85%; animation-delay: 0.3s; width: 4px; height: 4px; }
    .particle:nth-child(10) { top: 18%; left: 33%; animation-delay: 3.2s; width: 6px; height: 6px; }
    .particle:nth-child(11) { top: 72%; left: 64%; animation-delay: 1.1s; width: 5px; background: #FFE28C; }
    .particle:nth-child(12) { top: 40%; left: 96%; animation-delay: 0.9s; width: 5px; height: 5px; }
    .particle:nth-child(13) { top: 55%; left: 5%; animation-delay: 2.8s; width: 4px; }
    
    @keyframes driftGlow {
      0% { opacity: 0; transform: translateY(0px) scale(0.6); }
      25% { opacity: 0.9; transform: translateY(-12px) scale(1.2); }
      70% { opacity: 0.7; transform: translateY(6px) scale(0.9); }
      100% { opacity: 0; transform: translateY(20px) scale(0.4); }
    }

    /* ========= ADDITIONAL PREMIUM FINISH: scan shimmer & futuristic light sweep ========= */
    .donation-alert::after {
      content: '';
      position: absolute;
      top: 0;
      left: -20%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.08), transparent);
      transform: skewX(-20deg);
      pointer-events: none;
      z-index: 2;
      animation: goldShine 5s infinite linear;
    }
    @keyframes goldShine {
      0% { left: -30%; opacity: 0; }
      20% { opacity: 0.4; }
      40% { left: 110%; opacity: 0; }
      100% { left: 110%; opacity: 0; }
    }

    /* sharpness + vector-like quality */
    .username, .amount, .message-quote, .text-label {
      font-smoothing: antialiased;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      backface-visibility: hidden;
    }

    /* ultra HD responsiveness & edge sharpness */
    .donation-alert {
      transform: translateZ(0);
      will-change: box-shadow;
    }

    /* responsive stacking for small screens (keeps proportions) */
    @media (max-width: 860px) {
      .donation-alert {
        min-width: 94vw;
        padding: 12px 18px;
      }
      .alert-inner {
        gap: 14px;
      }
      .username {
        font-size: 28px;
        line-height: 1.2;
      }
      .amount {
        font-size: 24px;
      }
      .message-quote {
        font-size: 16px;
      }
      .text-label {
        font-size: 13px;
        padding-left: 10px;
      }
      .mascot-img {
        width: 70px;
        height: 70px;
      }
      .equalizer-area {
        gap: 4px;
      }
      .eq-bar {
        width: 4px;
      }
    }

    /* complete transparency enforcement – no inner opaque layers */
    .donation-alert, .alert-inner, .alert-text, .mascot-wrapper, .equalizer-area,
    .name-block, .message-block, .donation-alert * {
      background-color: transparent !important;
    }
    /* fallback for the ring */
    .mascot-wrapper::before {
      background: radial-gradient(circle, rgba(255,200,50,0.25), transparent 70%);
    }
  </style>
</head>
<body>
  <div class="donation-alert">
    <!-- double premium inner glow layer (no solid) -->
    <div class="glow-inner"></div>
    <!-- additional corner elements matching the same corner design language -->
    <div class="corner-accent corner-accent-1"></div>
    <div class="corner-accent corner-accent-2"></div>

    <!-- floating particles: futuristic cyber dust (only visible particles + glow) -->
    <div class="particle-field">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div>
    </div>

    <!-- MAIN LAYOUT: mascot + vertical text (exact reference hierarchy) + equalizer -->
    <div class="alert-inner">
      <!-- MASCOT / AVATAR (sidd-logo.jpg at root, perfect scale) -->
      <div class="mascot-wrapper">
        <img src="sidd-logo.jpg" alt="Siddharth" class="mascot-img" onerror="this.onerror=null; this.style.border='2px solid #FFD966'; this.style.background='radial-gradient(circle, #201e1a, #0a0804)'; this.style.boxShadow='0 0 20px #ffaa44';">
      </div>

      <!-- TEXT BLOCK – exact vertical arrangement: SIDDHARTH / ₹40 / TEXT label / message -->
      <div class="alert-text">
        <div class="username">SIDDHARTH</div>
        <div class="amount">₹40</div>
        <div class="text-label">TEXT</div>
        <div class="message-quote">“SIDD BHAI VANDAL SKIN REVIEW”</div>
      </div>

      <!-- GLOWING EQUALIZER (right side, same placement, enhanced bars) -->
      <div class="equalizer-area">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
    </div>
    <!-- no solid background, no grey panel – only frame, mascot, text, glow effects, equalizer, particles -->
  </div>

  <!-- additional ultra-sharp vector polish + cinematic contrast -->
  <style>
    /* intensify gold gradients & neon atmosphere */
    .username {
      background: linear-gradient(125deg, #FFF2BF, #FFD58C, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 16px rgba(255, 190, 50, 0.8);
    }
    .amount {
      background: linear-gradient(115deg, #FFE6A3, #FFC46B);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 14px #FFB347;
    }
    .message-quote {
      text-shadow: 0 0 12px #ffbb44, 0 1px 3px rgba(0,0,0,0.3);
      font-weight: 500;
    }
    .text-label {
      font-weight: 800;
      text-shadow: 0 0 6px #ffaa44;
      border-left: 3px solid #FFDE88;
    }
    /* frame intensity animation: immersive pulse */
    .donation-alert {
      animation: frameGlowPulse 2.4s infinite alternate;
    }
    @keyframes frameGlowPulse {
      0% { box-shadow: 0 0 12px rgba(255, 200, 30, 0.7), 0 0 26px rgba(255, 160, 20, 0.4), inset 0 0 12px rgba(255,215,0,0.2); border-color: rgba(255, 210, 60, 0.95);}
      100% { box-shadow: 0 0 26px rgba(255, 220, 60, 1), 0 0 44px rgba(255, 170, 0, 0.7), inset 0 0 20px rgba(255, 220, 50, 0.5); border-color: #FFDE88;}
    }
    /* ensure all containers stay fully transparent */
    body, div, section, .donation-alert, .alert-inner, .alert-text, .mascot-wrapper, .equalizer-area {
      background: transparent !important;
    }
    /* remove any accidental backgrounds from pseudo-elements */
    .donation-alert::before, .donation-alert::after, .corner-accent, .glow-inner {
      background: transparent;
    }
    .mascot-img {
      background: transparent !important;
    }
    /* high contrast rendering for streaming overlays */
    html {
      background: transparent;
    }
  </style>
</body>
</html>
