<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ecosystem Showcase | Real-time Broadcast Layer</title>
  <!-- Tailwind CSS v3 + basic reset -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom overrides for arbitrary opacity classes (Tailwind CDN lacks arbitrary values) -->
  <style>
    /* ----- FIX ARBITRARY OPACITY & CUSTOM SHADES ----- */
    .bg-white\/\[0\.06\] { background-color: rgba(255, 255, 255, 0.06); }
    .bg-white\/\[0\.022\] { background-color: rgba(255, 255, 255, 0.022); }
    .bg-white\/\[0\.03\] { background-color: rgba(255, 255, 255, 0.03); }
    .bg-white\/\[0\.07\] { background-color: rgba(255, 255, 255, 0.07); }
    .bg-white\/\[0\.05\] { background-color: rgba(255, 255, 255, 0.05); }
    .border-white\/\[0\.06\] { border-color: rgba(255, 255, 255, 0.06); }
    .border-white\/\[0\.05\] { border-color: rgba(255, 255, 255, 0.05); }
    .border-white\/\[0\.07\] { border-color: rgba(255, 255, 255, 0.07); }
    .border-white\/\[0\.1\] { border-color: rgba(255, 255, 255, 0.1); }

    .text-white\/40 { color: rgba(255, 255, 255, 0.4); }
    .text-white\/35 { color: rgba(255, 255, 255, 0.35); }
    .text-white\/38 { color: rgba(255, 255, 255, 0.38); }
    .text-white\/30 { color: rgba(255, 255, 255, 0.3); }
    .text-white\/60 { color: rgba(255, 255, 255, 0.6); }
    .text-white\/75 { color: rgba(255, 255, 255, 0.75); }
    .border-\[\#A855F7\]\/30 { border-color: rgba(168, 85, 247, 0.3); }
    .bg-\[\#A855F7\]\/\[0\.08\] { background-color: rgba(168, 85, 247, 0.08); }
    .border-\[\#06B6D4\]\/30 { border-color: rgba(6, 182, 212, 0.3); }
    .bg-\[\#06B6D4\]\/\[0\.08\] { background-color: rgba(6, 182, 212, 0.08); }
    .border-\[\#FF4D6D\]\/30 { border-color: rgba(255, 77, 109, 0.3); }
    .bg-\[\#FF4D6D\]\/\[0\.08\] { background-color: rgba(255, 77, 109, 0.08); }
    .border-\[\#10B981\]\/30 { border-color: rgba(16, 185, 129, 0.3); }
    .bg-\[\#10B981\]\/\[0\.08\] { background-color: rgba(16, 185, 129, 0.08); }
    .shadow-\[\#A855F7\]\/50 { box-shadow: 0 0 8px rgba(168, 85, 247, 0.5); }
    
    /* additional fallback for glows */
    .shadow-\[\#A855F7\]\/26 { box-shadow: 0 30px 80px -40px rgba(139, 92, 246, 0.26); }
    .bg-\[\#A855F7\]\/32 { background: linear-gradient(135deg, rgba(168,85,247,0.32), rgba(6,182,212,0.2)); }

    /* custom keyframes from original design */
    @keyframes alertFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-5px); }
    }
    @keyframes progressAnim {
      0%   { width: 15%; }
      50%  { width: 80%; }
      100% { width: 15%; }
    }
    @keyframes wavePulse {
      0%, 100% { transform: scaleY(1); }
      50%       { transform: scaleY(0.5); }
    }
    .animate-float-alert {
      animation: alertFloat 6s ease-in-out infinite;
    }
    .animate-progress {
      animation: progressAnim 4s ease-in-out infinite;
    }
    .animate-wave {
      animation: wavePulse 2.5s ease-in-out infinite;
    }
    /* additional smooth scroll */
    html {
      scroll-behavior: smooth;
    }
    body {
      background: #05050b;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }
    .font-mono {
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
  </style>
  <!-- Import Google Fonts (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- React + ReactDOM + Babel for JSX transformation (standalone) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#05050b] text-white antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    // -------- ICON REPLACEMENT (lucide-react removed, use emoji/span) --------
    const Mic2 = () => <span className="inline-block text-lg">🎙️</span>;
    const Layers = () => <span className="inline-block text-lg">📚</span>;
    const ShieldCheck = () => <span className="inline-block text-lg">🛡️</span>;
    const BarChart3 = () => <span className="inline-block text-lg">📊</span>;
    const Radio = () => <span className="inline-block text-lg">📡</span>;
    const Boxes = () => <span className="inline-block text-lg">📦</span>;
    const Activity = () => <span className="inline-block text-lg">📈</span>;
    const Zap = () => <span className="inline-block text-lg">⚡</span>;
    const Star = () => <span className="inline-block text-lg">⭐</span>;
    
    // -------- SHARED PRIMITIVES (styled with inline gradients and classes) --------
    const GradText = ({ children }) => (
      <span style={{
        background: "linear-gradient(135deg, #A855F7 15%, #06B6D4 85%)",
        WebkitBackgroundClip: "text",
        WebkitTextFillColor: "transparent",
        backgroundClip: "text",
      }}>{children}</span>
    );

    const Panel = ({ children, className = "", accent = "139,92,246", style = {} }) => (
      <div className={`relative rounded-2xl border border-white/[0.06] overflow-hidden ${className}`} style={{
        background: "rgba(10,10,24,0.82)",
        backdropFilter: "blur(20px)",
        WebkitBackdropFilter: "blur(20px)",
        boxShadow: `0 30px 80px -40px rgba(${accent},0.26)`,
        ...style
      }}>
        <div aria-hidden className="absolute inset-0 pointer-events-none rounded-2xl" style={{
          backgroundImage: "repeating-linear-gradient(0deg, rgba(255,255,255,0.016) 0 1px, transparent 1px 3px)",
        }} />
        {children}
      </div>
    );

    const Tag = ({ children, tone = "muted" }) => {
      const styles = {
        violet: "text-[#C4A8FF] border-[#A855F7]/30 bg-[#A855F7]/[0.08]",
        cyan: "text-[#7DE0FF] border-[#06B6D4]/30 bg-[#06B6D4]/[0.08]",
        coral: "text-[#FFA9B8] border-[#FF4D6D]/30 bg-[#FF4D6D]/[0.08]",
        green: "text-[#6EFFC0] border-[#10B981]/30 bg-[#10B981]/[0.08]",
        muted: "text-white/40 border-white/10 bg-white/[0.03]",
      };
      return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md border text-[10px] uppercase tracking-[0.16em] font-semibold ${styles[tone]}`}>{children}</span>;
    };

    const StatusDot = ({ color = "#A855F7" }) => (
      <span className="relative inline-flex w-2 h-2 shrink-0">
        <span className="absolute inset-0 rounded-full animate-ping opacity-60" style={{ background: color }} />
        <span className="relative w-2 h-2 rounded-full" style={{ background: color, boxShadow: `0 0 8px ${color}` }} />
      </span>
    );

    // Scroll reveal hook (no external deps)
    function useReveal() {
      const ref = React.useRef(null);
      const [visible, setVisible] = React.useState(false);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { setVisible(true); obs.unobserve(el); }
        }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return { ref, visible };
    }

    const Reveal = ({ children, delay = 0, className = "" }) => {
      const { ref, visible } = useReveal();
      return (
        <div ref={ref} className={className} style={{
          opacity: visible ? 1 : 0,
          transform: visible ? "translateY(0)" : "translateY(20px)",
          transition: `opacity 0.6s ease ${delay}ms, transform 0.6s ease ${delay}ms`,
        }}>{children}</div>
      );
    };

    // -------------------- PANELS --------------------
    const BroadcastPanel = () => (
      <Panel accent="139,92,246" className="p-7 flex flex-col h-full">
        <div className="flex items-center justify-between mb-5">
          <div className="flex items-center gap-2"><Tag tone="violet">Realtime engine</Tag><Tag tone="muted">v4.2</Tag></div>
          <div className="flex items-center gap-2 text-[11px] text-white/40 font-mono"><StatusDot color="#10B981" /> live · 14ms p95</div>
        </div>
        <div className="flex items-start gap-4 mb-5">
          <div className="w-11 h-11 rounded-xl grid place-items-center shrink-0 border border-white/10" style={{ background: "linear-gradient(135deg, rgba(168,85,247,0.35), rgba(6,182,212,0.2))", boxShadow: "0 10px 30px -10px rgba(168,85,247,0.5)" }}><Radio /></div>
          <div><h3 className="font-bold text-white text-xl md:text-2xl leading-tight tracking-tight">Broadcast-grade alert orchestration</h3><p className="text-white/50 text-sm mt-2 max-w-[44ch] leading-relaxed">Priority queue, deterministic ordering, zero-flicker delivery into OBS — every event reconciled through one realtime spine.</p></div>
        </div>
        <div className="mt-auto">
          <div className="rounded-xl border border-white/[0.07] overflow-hidden relative" style={{ background: "linear-gradient(180deg, #0d0d18 0%, #07070d 100%)", aspectRatio: "16/9" }}>
            <div aria-hidden className="absolute inset-0 pointer-events-none" style={{ background: "radial-gradient(circle at 20% 30%, rgba(168,85,247,0.18), transparent 55%), radial-gradient(circle at 80% 75%, rgba(6,182,212,0.13), transparent 55%)" }} />
            <div className="absolute top-2 left-2.5 flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{ background: "rgba(255,77,109,0.7)" }} /><span className="w-2 h-2 rounded-full" style={{ background: "rgba(255,122,0,0.7)" }} /><span className="w-2 h-2 rounded-full" style={{ background: "rgba(16,185,129,0.7)" }} /></div>
            <div className="absolute top-2 right-3 text-[9px] font-mono text-white/30 uppercase tracking-[0.2em]">OBS · scene 03</div>
            <div className="absolute bottom-3.5 left-1/2 -translate-x-1/2 w-[82%] rounded-xl border border-[#A855F7]/32 px-3.5 py-3" style={{ background: "linear-gradient(135deg, rgba(20,15,35,0.94), rgba(15,10,28,0.94))", boxShadow: "0 18px 44px -10px rgba(0,0,0,0.75), 0 0 28px rgba(168,85,247,0.22)", animation: "alertFloat 6s ease-in-out infinite" }}>
              <div className="flex items-center gap-2.5"><div className="w-8 h-8 rounded-lg grid place-items-center text-[11px] font-bold text-white shrink-0" style={{ background: "linear-gradient(135deg, #A855F7, #06B6D4)" }}>AK</div><div className="flex-1 min-w-0"><div className="text-[11px] font-semibold text-white truncate">AsphaltKing donated <span className="text-[#A855F7]">₹2,500</span></div><div className="text-[10px] text-white/50 truncate font-mono mt-0.5">"Insane play! Take this 🔥"</div></div><div className="text-[10px] text-[#10B981] font-mono whitespace-nowrap">▶ playing</div></div>
              <div className="mt-2 h-[3px] rounded-full bg-white/10 overflow-hidden"><div className="h-full rounded-full" style={{ background: "linear-gradient(90deg, #A855F7, #06B6D4)", boxShadow: "0 0 8px #A855F7", animation: "progressAnim 4s ease-in-out infinite" }} /></div>
            </div>
          </div>
          <div className="mt-3 grid grid-cols-3 gap-2">
            {[{ t: "12:04:18", e: "alert.queued", c: "#A855F7" },{ t: "12:04:18", e: "tts.synth.ok", c: "#06B6D4" },{ t: "12:04:19", e: "obs.render", c: "#10B981" }].map((row) => (<div key={row.e} className="flex items-center gap-1.5 px-2 py-1.5 rounded-md bg-white/[0.022] border border-white/[0.05] font-mono text-[9px]"><span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ background: row.c }} /><span className="text-white/30">{row.t}</span><span className="text-white/60 truncate">{row.e}</span></div>))}
          </div>
        </div>
      </Panel>
    );

    const VoicePanel = () => {
      const bars = Array.from({ length: 44 }, (_, i) => ({ h: Math.min(18 + Math.abs(Math.sin(i * 0.55) * 70) + (i % 5 === 0 ? 12 : 0), 95), grad: i % 3 === 0, dim: i >= 29, delay: i * 0.06 }));
      return (
        <Panel accent="6,182,212" className="p-6 flex flex-col h-full">
          <div className="flex items-center justify-between mb-3"><Tag tone="cyan">AI voice</Tag><span className="font-mono text-[10px] text-white/35">8 voices · 12 langs</span></div>
          <div className="flex items-center gap-3 mb-3"><div className="w-9 h-9 rounded-lg grid place-items-center border border-white/10 shrink-0" style={{ background: "linear-gradient(135deg, rgba(6,182,212,0.3), rgba(168,85,247,0.15))" }}><Mic2 /></div><div><div className="text-sm font-semibold text-white">Voice synthesis</div><div className="text-[11px] text-white/40 mt-0.5">Tiered MiniMax · sub-second</div></div></div>
          <div className="mt-auto flex items-center gap-[2px] h-16">{bars.map((b, i) => (<span key={i} className="flex-1 rounded-full" style={{ height: `${b.h}%`, background: b.grad ? "linear-gradient(180deg, #06B6D4, #A855F7)" : "rgba(6,182,212,0.55)", opacity: b.dim ? 0.28 : 1, animation: `wavePulse 2.5s ease-in-out ${b.delay}s infinite` }} />))}</div>
          <div className="flex justify-between mt-2 font-mono text-[10px] text-white/35"><span>0:00</span><span className="text-[#06B6D4]">● rec</span><span>0:08</span></div>
        </Panel>
      );
    };

    const AnalyticsPanel = () => {
      const bars = [40, 55, 48, 72, 60, 88, 70, 95, 80, 110, 92, 130];
      return (
        <Panel accent="139,92,246" className="p-6 flex flex-col h-full">
          <div className="flex items-center justify-between mb-3"><Tag tone="violet">Analytics</Tag><div className="flex items-center gap-1 font-mono text-[10px] text-[#10B981]"><Activity /> +18.4%</div></div>
          <div className="text-2xl font-bold tracking-tight text-white">₹4.82L</div><div className="text-[11px] text-white/35 font-mono mb-3">last 7 days</div>
          <div className="flex items-end gap-1.5 h-[72px]">{bars.map((h, i) => (<div key={i} className="flex-1 rounded-t-[3px]" style={{ height: `${(h / 130) * 100}%`, background: i === bars.length-1 ? "linear-gradient(180deg, #A855F7, #06B6D4)" : "rgba(168,85,247,0.28)", boxShadow: i === bars.length-1 ? "0 0 14px rgba(168,85,247,0.6)" : "none" }} />))}</div>
        </Panel>
      );
    };

    const ModerationPanel = () => (
      <Panel accent="255,77,109" className="p-6 flex flex-col h-full">
        <div className="flex items-center justify-between mb-3"><Tag tone="coral">Moderation</Tag><span className="font-mono text-[10px] text-white/35">3 channels</span></div>
        <div className="flex items-center gap-3 mb-4"><div className="w-9 h-9 rounded-lg grid place-items-center border border-white/10 shrink-0" style={{ background: "linear-gradient(135deg, rgba(255,77,109,0.25), rgba(255,122,0,0.15))" }}><ShieldCheck /></div><div><div className="text-sm font-semibold text-white">Two-layer review</div><div className="text-[11px] text-white/40 mt-0.5">Dashboard · Telegram · Discord</div></div></div>
        <div className="mt-auto space-y-2">{[{ label: "Approved", val: "98.4%", color: "#10B981", w: "98%" },{ label: "Pending", val: "1.1%", color: "#FF7A00", w: "10%" },{ label: "Flagged", val: "0.5%", color: "#FF4D6D", w: "5%" }].map((r) => (<div key={r.label} className="flex items-center gap-2.5 text-[11px]"><span className="w-14 text-white/50 shrink-0">{r.label}</span><div className="flex-1 h-1.5 rounded-full bg-white/[0.06] overflow-hidden"><div className="h-full rounded-full" style={{ width: r.w, background: r.color, boxShadow: `0 0 8px ${r.color}80` }} /></div><span className="font-mono text-white/75 w-10 text-right">{r.val}</span></div>))}</div>
      </Panel>
    );

    const PipelinePanel = () => (
      <Panel accent="6,182,212" className="p-6 flex flex-col h-full">
        <div className="flex items-center justify-between mb-3"><Tag tone="cyan">Priority pipeline</Tag><Zap /></div>
        <div className="text-sm font-semibold text-white mb-1">Tier-aware media routing</div><div className="text-[11px] text-white/40 mb-4">Hyperemote → Voice → Text, buffer-aware.</div>
        <div className="mt-auto space-y-2">{[{ name: "Hyperemote", lv: "P0", color: "#FF4D6D" },{ name: "Voice", lv: "P1", color: "#A855F7" },{ name: "Text", lv: "P2", color: "#06B6D4" }].map((p) => (<div key={p.name} className="flex items-center justify-between px-2.5 py-2 rounded-lg bg-white/[0.022] border border-white/[0.05]"><div className="flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full" style={{ background: p.color, boxShadow: `0 0 6px ${p.color}` }} /><span className="text-[12px] text-white/80">{p.name}</span></div><span className="font-mono text-[10px] text-white/38">{p.lv}</span></div>))}</div>
      </Panel>
    );

    const IntegrationsPanel = () => (
      <Panel accent="139,92,246" className="p-6 flex flex-col h-full">
        <div className="flex items-center justify-between mb-3"><Tag tone="violet">Integrations</Tag><Boxes /></div>
        <div className="text-sm font-semibold text-white mb-1">Plug into the stack</div><div className="text-[11px] text-white/40 mb-2">Native adapters, zero glue code.</div>
        <div className="mt-auto grid grid-cols-2 gap-1.5">{["OBS", "Pusher", "Razorpay", "Kick", "Twitch", "Discord", "Telegram", "YouTube"].map((s) => (<div key={s} className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-white/[0.022] border border-white/[0.05] text-[11px] text-white/60"><span className="w-1 h-1 rounded-full bg-white/30" />{s}</div>))}</div>
      </Panel>
    );

    // XP ECONOMY SECTION
    const XpEconomy = () => {
      const flow = [{ label: "Viewer donates", sub: "₹100 min", accent: "rgba(168,85,247,0.35)", border: "rgba(168,85,247,0.3)", textColor: "#C4A8FF" },{ label: "4 XP / ₹100", sub: "earn rate", accent: undefined, border: undefined, textColor: undefined },{ label: "XP balance", sub: "non-transferable", accent: undefined, border: undefined, textColor: undefined },{ label: "Reward store", sub: "2× markup", accent: undefined, border: undefined, textColor: undefined },{ label: "70% XP / 30% ₹", sub: "co-pay split", accent: "rgba(16,185,129,0.28)", border: "rgba(16,185,129,0.35)", textColor: "#6EFFC0" }];
      const econCards = [{ icon: "⚡", val: "4 XP", label: "per ₹100 donated", grad: "#A855F7, #7C3AED", border: "rgba(168,85,247,0.22)" },{ icon: "🏪", val: "2×", label: "store markup rate", grad: "#06B6D4, #0891B2", border: "rgba(6,182,212,0.22)" },{ icon: "💸", val: "70%", label: "XP co-payment share", grad: "#10B981, #059669", border: "rgba(16,185,129,0.22)" },{ icon: "🛡️", val: "₹20", label: "farming detection floor", grad: "#FF4D6D, #FF7A00", border: "rgba(255,77,109,0.22)" }];
      return (
        <section className="py-24 relative z-10" style={{ background: "rgba(168,85,247,0.025)", borderTop: "1px solid rgba(255,255,255,0.04)", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
          <div className="container mx-auto px-4 md:px-10">
            <Reveal><div className="mb-2"><div className="inline-flex items-center gap-2 px-3 py-1 rounded-full text-[11px] uppercase tracking-[0.18em] text-white/55 border border-white/10 bg-white/[0.03] font-mono mb-4"><Star /> XP economy</div></div><h2 className="text-4xl md:text-5xl font-bold tracking-tight leading-[1.05] mb-3">Viewers earn. <GradText>Creators win.</GradText></h2><p className="text-white/50 text-base max-w-md leading-relaxed font-light">Every rupee donated fuels the XP flywheel — points earned, rewards redeemed, retention compounded.</p></Reveal>
            <Reveal delay={100}><div className="flex items-center mt-12 mb-10 overflow-x-auto pb-2 gap-0">{flow.map((node, i) => (<React.Fragment key={node.label}><div className="flex-shrink-0 px-4 py-3 rounded-xl border text-center min-w-[108px]" style={{ background: node.accent ?? "rgba(10,10,24,0.9)", borderColor: node.border ?? "rgba(255,255,255,0.1)" }}><div className="text-[12px] font-semibold" style={{ color: node.textColor ?? "rgba(255,255,255,0.85)" }}>{node.label}</div><div className="text-[10px] text-white/35 font-mono mt-1">{node.sub}</div></div>{i < flow.length-1 && (<div className="flex-shrink-0 relative" style={{ width: 36, height: 2, background: "linear-gradient(90deg, rgba(168,85,247,0.45), rgba(6,182,212,0.45))" }}><div style={{ position: "absolute", right: -1, top: -4, borderTop: "5px solid transparent", borderBottom: "5px solid transparent", borderLeft: "5px solid rgba(6,182,212,0.45)" }} /></div>)}</React.Fragment>))}</div></Reveal>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{econCards.map((c, i) => (<Reveal key={c.val} delay={i*80}><div className="rounded-2xl p-5 text-center" style={{ background: "rgba(10,10,24,0.9)", border: `1px solid ${c.border}` }}><div className="text-2xl mb-3">{c.icon}</div><div className="text-3xl font-bold tracking-tight leading-none mb-2" style={{ background: `linear-gradient(135deg, ${c.grad})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>{c.val}</div><div className="text-[11px] text-white/35 font-mono">{c.label}</div></div></Reveal>))}</div>
          </div>
        </section>
      );
    };

    // MAIN ECOSYSTEM SHOWCASE
    const EcosystemShowcase = () => (
      <>
        <section id="ecosystem" className="relative py-24 md:py-32" style={{ background: "radial-gradient(ellipse 80% 50% at 50% 0%, rgba(168,85,247,0.07), transparent 60%)" }}>
