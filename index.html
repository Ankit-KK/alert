<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Alert - Siddharth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert-box {
            position: relative;
            width: 900px;
            height: 200px;
            background: #2a2a2a;
            border: 3px solid #FFD700;
            opacity: 0;
            transform: translateX(-100%);
            transition: all 0.5s ease-out;
        }

        .alert-box.show {
            opacity: 1;
            transform: translateX(0);
        }

        .alert-box.hide {
            opacity: 0;
            transform: translateX(-100%);
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #FFD700;
        }

        .corner.top-left {
            top: -3px;
            left: 80px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: -3px;
            right: 80px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: -3px;
            left: 80px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: -3px;
            right: 80px;
            border-left: none;
            border-top: none;
        }

        /* Top and bottom border lines */
        .border-line {
            position: absolute;
            height: 3px;
            background: #FFD700;
        }

        .border-line.top {
            top: 15px;
            left: 120px;
            right: 120px;
        }

        .border-line.bottom {
            bottom: 15px;
            left: 120px;
            right: 120px;
        }

        .content {
            display: flex;
            align-items: center;
            padding: 20px 40px;
            height: 100%;
            position: relative;
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin-right: 30px;
        }

        .avatar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #FFD700;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            padding: 4px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border: 3px solid #2a2a2a;
            overflow: hidden;
        }

        .text-section {
            flex: 1;
            color: #FFD700;
        }

        .name {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .amount-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 20px;
        }

        .rupee {
            font-size: 36px;
            font-weight: 700;
            color: #FFD700;
        }

        .amount {
            font-size: 56px;
            font-weight: 900;
            color: #FFD700;
            line-height: 1;
        }

        .text-type {
            font-size: 28px;
            font-weight: 700;
            color: #FFD700;
            text-transform: uppercase;
        }

        .message {
            font-size: 20px;
            color: #d4af37;
            font-style: italic;
            letter-spacing: 1px;
        }

        .sound-icon {
            position: absolute;
            right: 40px;
            bottom: 40px;
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 35px;
        }

        .sound-bar {
            width: 5px;
            background: #FFD700;
            border-radius: 2px;
            animation: soundWave 1s ease-in-out infinite;
        }

        .sound-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
        .sound-bar:nth-child(2) { height: 70%; animation-delay: 0.1s; }
        .sound-bar:nth-child(3) { height: 50%; animation-delay: 0.2s; }
        .sound-bar:nth-child(4) { height: 90%; animation-delay: 0.3s; }
        .sound-bar:nth-child(5) { height: 60%; animation-delay: 0.4s; }

        @keyframes soundWave {
            0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Demo controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .demo-controls button {
            padding: 10px 20px;
            background: #FFD700;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            color: #2a2a2a;
            transition: all 0.2s;
        }

        .demo-controls button:hover {
            background: #FFA500;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="alert-box" id="alertBox">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        
        <div class="border-line top"></div>
        <div class="border-line bottom"></div>
        
        <div class="content">
            <div class="avatar-container">
                <div class="avatar-ring"></div>
                <div class="avatar" id="avatar">🐵</div>
            </div>
            
            <div class="text-section">
                <div class="name" id="name">SIDDHARTH</div>
                <div class="amount-row">
                    <span class="rupee">₹</span>
                    <span class="amount" id="amount">40</span>
                    <span class="text-type" id="textType">TEXT</span>
                </div>
                <div class="message" id="message">"SIDD BHAI VANDAL SKIN REVIEW"</div>
            </div>
            
            <div class="sound-icon">
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
            </div>
        </div>
    </div>

    <div class="demo-controls">
        <button onclick="showAlert()">Show Alert</button>
        <button onclick="hideAlert()">Hide</button>
    </div>

    <script>
        function showAlert() {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.remove('hide');
            alertBox.classList.add('show');
            
            setTimeout(() => {
                hideAlert();
            }, 5000);
        }

        function hideAlert() {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.remove('show');
            alertBox.classList.add('hide');
        }

        // Listen for external triggers
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'alert') {
                updateAlert(event.data);
                showAlert();
            }
        });

        function updateAlert(data) {
            if (data.name) document.getElementById('name').textContent = data.name;
            if (data.amount) document.getElementById('amount').textContent = data.amount;
            if (data.message) document.getElementById('message').textContent = `"${data.message}"`;
            if (data.avatar) {
                document.getElementById('avatar').innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;object-fit:cover;">`;
            }
        }

        // URL parameter support
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('show')) {
                updateAlert({
                    name: params.get('name') || 'SIDDHARTH',
                    amount: params.get('amount') || '40',
                    message: params.get('message') || 'SIDD BHAI VANDAL SKIN REVIEW'
                });
                showAlert();
            }
        });

        // Spacebar to trigger
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                showAlert();
            }
        });
    </script>
</body>
</html>
