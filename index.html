<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SIDDHARTH — Beveled Edge Cyber Alert | Angled Corners | OBS Ready</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    /* FULLY TRANSPARENT BACKGROUND — no solid panels, no grey rectangle */
    body, html {
      background: transparent;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', 'Rajdhani', 'Poppins', 'Segoe UI', system-ui, monospace;
      margin: 0;
      padding: 20px;
    }

    /* ========= MAIN ALERT CONTAINER – BEVELED / ANGLED CORNERS (no 90°) ========= */
    /* using clip-path to create 45° slanted corners on all four sides */
    .donation-alert {
      position: relative;
      width: 1100px;
      max-width: 92vw;
      min-width: 860px;
      background: transparent;
      /* gold frame – will be clipped to the beveled shape */
      border: 2.5px solid #FFD966;
      border-radius: 0;
      /* clip-path: bevel corners (20px inward slant) */
      clip-path: polygon(
        24px 0,
        calc(100% - 24px) 0,
        100% 24px,
        100% calc(100% - 24px),
        calc(100% - 24px) 100%,
        24px 100%,
        0 calc(100% - 24px),
        0 24px
      );
      /* outer glow that respects shape (using drop-shadow) */
      filter: drop-shadow(0 0 12px rgba(255, 190, 30, 0.8)) drop-shadow(0 0 24px rgba(255, 160, 20, 0.5));
      backdrop-filter: none;
      overflow: visible;
      padding: 22px 28px 22px 26px;
      transition: all 0.2s ease;
    }

    /* Additional external angled lines – corner brackets that extend outwards (angled) */
    .donation-alert::before,
    .donation-alert::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: #FFE484;
      border-style: solid;
      filter: drop-shadow(0 0 6px #ffaa44);
      pointer-events: none;
      z-index: 6;
      clip-path: none; /* keep these as normal elements outside the clip-path */
    }
    /* top-left external angled bracket (mirrors the bevel) */
    .donation-alert::before {
      top: -8px;
      left: -8px;
      border-width: 4px 0 0 4px;
      transform: rotate(0deg);
    }
    /* bottom-right external angled bracket */
    .donation-alert::after {
      bottom: -8px;
      right: -8px;
      border-width: 0 4px 4px 0;
    }

    /* top-right + bottom-left external corner accents (angled, matching bevel vibe) */
    .corner-accent-tr {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 36px;
      height: 36px;
      border-width: 0 4px 4px 0;
      border-style: solid;
      border-color: #FFD966;
      filter: drop-shadow(0 0 5px #ffbb44);
      pointer-events: none;
      z-index: 6;
    }
    .corner-accent-bl {
      position: absolute;
      bottom: -8px;
      left: -8px;
      width: 36px;
      height: 36px;
      border-width: 4px 0 0 4px;
      border-style: solid;
      border-color: #FFD966;
      filter: drop-shadow(0 0 5px #ffbb44);
      pointer-events: none;
      z-index: 6;
    }

    /* Inner angled glow line (repeats the bevel pattern) */
    .donation-alert .glow-inner {
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      border: 1px solid rgba(255, 200, 70, 0.7);
      box-shadow: inset 0 0 12px rgba(255, 190, 0, 0.4);
      pointer-events: none;
      background: transparent;
      clip-path: polygon(
        20px 0,
        calc(100% - 20px) 0,
        100% 20px,
        100% calc(100% - 20px),
        calc(100% - 20px) 100%,
        20px 100%,
        0 calc(100% - 20px),
        0 20px
      );
    }

    /* FLEX LAYOUT: mascot | text block | equalizer */
    .alert-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 26px;
      width: 100%;
      background: transparent;
      position: relative;
      z-index: 5;
    }

    /* ========= MASCOT (avatar) ========= */
    .mascot-wrapper {
      flex-shrink: 0;
      position: relative;
      filter: drop-shadow(0 0 14px #ffbb44);
    }
    .mascot-wrapper::before {
      content: '';
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      background: radial-gradient(circle, rgba(255,200,50,0.3), transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: pulseRing 2s infinite alternate;
      border-radius: 0px;
    }
    @keyframes pulseRing {
      0% { opacity: 0.4; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1.08); }
    }
    .mascot-img {
      width: 96px;
      height: 96px;
      object-fit: cover;
      border-radius: 50%;
      border: 2.5px solid #FFD966;
      box-shadow: 0 0 22px rgba(255, 200, 0, 0.9), inset 0 0 8px rgba(255, 220, 100, 0.7);
      background: transparent;
      display: block;
    }

    /* ========= TEXT AREA – extremely visible username & premium hierarchy ========= */
    .alert-text {
      flex: 1;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 12px;
    }
    /* USERNAME – bold, large, intense glow */
    .username {
      font-size: 54px;
      font-weight: 900;
      letter-spacing: 3.5px;
      background: linear-gradient(145deg, #FFF5CF, #FFDE9E, #FFBC5E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(255, 200, 0, 0.9), 0 0 10px rgba(255, 160, 0, 0.7);
      font-family: 'Orbitron', 'Rajdhani', monospace;
      line-height: 1.2;
    }
    /* Amount (₹40) */
    .amount {
      font-size: 44px;
      font-weight: 800;
      background: linear-gradient(135deg, #FFEAA8, #FFC86F);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 22px #FFB84D;
      letter-spacing: 1.5px;
      font-family: 'Orbitron', monospace;
      margin-top: -4px;
    }
    /* "TEXT" label */
    .text-label {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #FFE9BF;
      text-transform: uppercase;
      text-shadow: 0 0 14px #ffaa44;
      background: transparent;
      display: inline-block;
      margin-top: 8px;
      font-family: 'Rajdhani', monospace;
      border-left: 3px solid #FFD966;
      padding-left: 14px;
    }
    /* quoted message */
    .message-quote {
      font-size: 26px;
      font-weight: 600;
      color: #FFF6E6;
      text-shadow: 0 0 16px #FFB347, 0 1px 2px rgba(0,0,0,0.2);
      letter-spacing: 0.5px;
      font-family: 'Poppins', 'Orbitron', sans-serif;
      background: transparent;
      word-break: break-word;
    }

    /* Responsive text */
    @media (max-width: 950px) {
      .username { font-size: 40px; letter-spacing: 2px; }
      .amount { font-size: 34px; }
      .message-quote { font-size: 20px; }
      .text-label { font-size: 15px; }
      .donation-alert { min-width: 680px; padding: 16px 22px; }
      .mascot-img { width: 78px; height: 78px; }
    }

    /* ========= GLOWING EQUALIZER (right side, animated) ========= */
    .equalizer-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: transparent;
      padding-left: 12px;
      margin-left: 4px;
      filter: drop-shadow(0 0 10px #ffbc3c);
    }
    .eq-bar {
      width: 6px;
      background: linear-gradient(to top, #FFD966, #FFAA33, #FFE484);
      border-radius: 1px;
      box-shadow: 0 0 12px #ffb347, 0 0 3px #ffdd88;
      transition: height 0.18s ease;
      animation: cyberPulse 1.3s infinite ease-in-out alternate;
      transform-origin: bottom;
    }
    .eq-bar:nth-child(1) { height: 20px; animation-duration: 0.9s; }
    .eq-bar:nth-child(2) { height: 36px; animation-duration: 1.2s; animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { height: 28px; animation-duration: 0.8s; animation-delay: 0.2s; }
    .eq-bar:nth-child(4) { height: 48px; animation-duration: 1.4s; animation-delay: 0.05s; }
    .eq-bar:nth-child(5) { height: 24px; animation-duration: 1s; animation-delay: 0.3s; }
    .eq-bar:nth-child(6) { height: 40px; animation-duration: 1.25s; animation-delay: 0.15s; }
    .eq-bar:nth-child(7) { height: 30px; animation-duration: 1.1s; animation-delay: 0.25s; }

    @keyframes cyberPulse {
      0% { height: 12px; opacity: 0.8; filter: brightness(0.9); }
      100% { height: 52px; opacity: 1; filter: brightness(1.3) drop-shadow(0 0 6px gold); }
    }

    /* ========= FLOATING PARTICLES (cyber dust / glow effects) ========= */
    .particle-field {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: visible;
    }
    .particle {
      position: absolute;
      background: radial-gradient(circle, #FFE484, #FFB347);
      width: 5px;
      height: 5px;
      border-radius: 0px;
      opacity: 0;
      filter: blur(0.5px);
      animation: driftGlow 5s infinite ease-in-out;
      box-shadow: 0 0 10px #ffcc55;
    }
    .particle:nth-child(1) { top: 12%; left: 7%; animation-delay: 0s; width: 6px; height: 6px; }
    .particle:nth-child(2) { top: 78%; left: 94%; animation-delay: 0.8s; width: 4px; height: 4px; }
    .particle:nth-child(3) { top: 35%; left: 18%; animation-delay: 1.5s; width: 7px; height: 7px; }
    .particle:nth-child(4) { top: 88%; left: 42%; animation-delay: 0.5s; width: 5px; height: 5px; }
    .particle:nth-child(5) { top: 22%; left: 72%; animation-delay: 2.2s; width: 5px; height: 5px; }
    .particle:nth-child(6) { top: 65%; left: 12%; animation-delay: 1.9s; width: 4px; height: 4px; }
    .particle:nth-child(7) { top: 8%; left: 52%; animation-delay: 3s; width: 6px; height: 6px; }
    .particle:nth-child(8) { top: 92%; left: 76%; animation-delay: 2.5s; width: 5px; height: 5px; }
    .particle:nth-child(9) { top: 48%; left: 85%; animation-delay: 0.3s; width: 4px; height: 4px; }
    .particle:nth-child(10) { top: 18%; left: 33%; animation-delay: 3.2s; width: 6px; height: 6px; }
    .particle:nth-child(11) { top: 72%; left: 64%; animation-delay: 1.1s; width: 5px; }
    .particle:nth-child(12) { top: 40%; left: 96%; animation-delay: 0.9s; width: 5px; }
    .particle:nth-child(13) { top: 55%; left: 5%; animation-delay: 2.8s; width: 4px; }

    @keyframes driftGlow {
      0% { opacity: 0; transform: translateY(0px) scale(0.6); }
      25% { opacity: 0.9; transform: translateY(-12px) scale(1.2); }
      70% { opacity: 0.7; transform: translateY(6px) scale(0.9); }
      100% { opacity: 0; transform: translateY(20px) scale(0.4); }
    }

    /* Gold shimmer scan line – adds cinematic movement */
    .gold-scan {
      position: absolute;
      top: 0;
      left: -20%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.12), transparent);
      transform: skewX(-20deg);
      pointer-events: none;
      z-index: 3;
      animation: goldShine 5s infinite linear;
      clip-path: polygon(
        24px 0,
        calc(100% - 24px) 0,
        100% 24px,
        100% calc(100% - 24px),
        calc(100% - 24px) 100%,
        24px 100%,
        0 calc(100% - 24px),
        0 24px
      );
    }
    @keyframes goldShine {
      0% { left: -30%; opacity: 0; }
      20% { opacity: 0.4; }
      40% { left: 110%; opacity: 0; }
      100% { left: 110%; opacity: 0; }
    }

    /* Frame glow pulse that works with bevel */
    .donation-alert {
      animation: frameGlowPulse 2.4s infinite alternate;
    }
    @keyframes frameGlowPulse {
      0% { filter: drop-shadow(0 0 8px rgba(255, 200, 30, 0.7)) drop-shadow(0 0 20px rgba(255, 160, 20, 0.5)); }
      100% { filter: drop-shadow(0 0 20px rgba(255, 220, 60, 1)) drop-shadow(0 0 32px rgba(255, 170, 0, 0.8)); }
    }

    /* ultra sharp vector rendering */
    .username, .amount, .message-quote, .text-label {
      font-smoothing: antialiased;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      backface-visibility: hidden;
    }

    @media (max-width: 860px) {
      .donation-alert {
        min-width: 94vw;
        padding: 14px 18px;
        clip-path: polygon(
          18px 0,
          calc(100% - 18px) 0,
          100% 18px,
          100% calc(100% - 18px),
          calc(100% - 18px) 100%,
          18px 100%,
          0 calc(100% - 18px),
          0 18px
        );
      }
      .alert-inner {
        gap: 14px;
      }
      .username {
        font-size: 34px;
        letter-spacing: 1.5px;
      }
      .amount {
        font-size: 28px;
      }
      .message-quote {
        font-size: 18px;
      }
      .text-label {
        font-size: 13px;
        padding-left: 10px;
      }
      .mascot-img {
        width: 70px;
        height: 70px;
      }
      .equalizer-area {
        gap: 4px;
      }
      .eq-bar {
        width: 4px;
      }
      .glow-inner {
        clip-path: polygon(
          14px 0,
          calc(100% - 14px) 0,
          100% 14px,
          100% calc(100% - 14px),
          calc(100% - 14px) 100%,
          14px 100%,
          0 calc(100% - 14px),
          0 14px
        );
      }
    }

    /* FULL TRANSPARENCY ENFORCEMENT – no background panels */
    .donation-alert, .alert-inner, .alert-text, .mascot-wrapper, .equalizer-area,
    .donation-alert * {
      background-color: transparent !important;
    }
    .mascot-wrapper::before {
      background: radial-gradient(circle, rgba(255,200,50,0.25), transparent 70%);
    }
    body, html, .donation-alert, .glow-inner, .corner-accent-tr, .corner-accent-bl {
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="donation-alert">
    <!-- Inner angled glow layer (matches bevel) -->
    <div class="glow-inner"></div>
    <!-- External angled corner brackets (extended lines) -->
    <div class="corner-accent-tr"></div>
    <div class="corner-accent-bl"></div>

    <!-- Floating particles & glow effects (only visible elements) -->
    <div class="particle-field">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="gold-scan"></div>

    <!-- MAIN LAYOUT: mascot + text + equalizer (exact reference structure) -->
    <div class="alert-inner">
      <!-- MASCOT (sidd-logo.jpg at root) -->
      <div class="mascot-wrapper">
        <img src="sidd-logo.jpg" alt="Siddharth" class="mascot-img" onerror="this.onerror=null; this.style.border='2.5px solid #FFD966'; this.style.background='radial-gradient(circle, #1f1b12, #0a0804)'; this.style.boxShadow='0 0 20px #ffaa44';">
      </div>

      <!-- TEXT EXACTLY: SIDDHARTH / ₹40 / TEXT / message -->
      <div class="alert-text">
        <div class="username">SIDDHARTH</div>
        <div class="amount">₹40</div>
        <div class="text-label">TEXT</div>
        <div class="message-quote">“SIDD BHAI VANDAL SKIN REVIEW”</div>
      </div>

      <!-- GLOWING EQUALIZER (right side, animated bars) -->
      <div class="equalizer-area">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
    </div>
    <!-- FULLY TRANSPARENT BACKGROUND – only frame, mascot, text, equalizer, particles remain -->
  </div>
</body>
</html>
