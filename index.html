<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SIDDHARTH — Donation Alert | OBS Ready</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; }

    /* ── CSS VARIABLES ── */
    :root {
      --gold-start:   #FFD166;
      --gold-mid:     #E8A44A;
      --rose-gold:    #D4896A;
      --rose-light:   #F0B89A;
      --cream:        #FFF3E8;
      --bronze-deep:  #7A4A1A;

      --grad-h: linear-gradient(90deg, var(--gold-start) 0%, var(--gold-mid) 40%, var(--rose-gold) 75%, var(--rose-light) 100%);
      --grad-v: linear-gradient(160deg, var(--gold-start) 0%, var(--gold-mid) 45%, var(--rose-gold) 80%, var(--rose-light) 100%);

      /* shadow layers — used across text & UI elements */
      --text-shadow-gold:
        0 2px 10px rgba(0,0,0,0.92),
        0 0 22px rgba(232,164,74,0.7),
        0 0 48px rgba(212,137,106,0.45);
    }

    body, html {
      background: transparent;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      padding: 20px;
    }

    /* ═══════════════════════════════════════
       OUTER WRAP  — drifts up from below
    ═══════════════════════════════════════ */
    .outer-wrap {
      position: relative;
      display: inline-block;
      opacity: 0;
      transform: translateY(56px) scale(0.92);
    }
    .outer-wrap.entering {
      animation: wrapEnter 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    .outer-wrap.leaving {
      animation: wrapLeave 0.65s cubic-bezier(0.7, 0, 1, 0.6) forwards;
    }
    @keyframes wrapEnter {
      0%   { opacity:0; transform: translateY(56px) scale(0.92); filter: blur(4px); }
      60%  { opacity:1; filter: blur(0); }
      100% { opacity:1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    @keyframes wrapLeave {
      0%   { opacity:1; transform: translateY(0)    scale(1);    filter: blur(0); }
      100% { opacity:0; transform: translateY(-36px) scale(0.94); filter: blur(3px); }
    }

    /* ═══════════════════════════════════════
       CARD
    ═══════════════════════════════════════ */
    .card {
      position: relative;
      width: 900px;
      max-width: 96vw;
      clip-path: polygon(
        22px 0, calc(100% - 22px) 0, 100% 22px,
        100% calc(100% - 22px), calc(100% - 22px) 100%,
        22px 100%, 0 calc(100% - 22px), 0 22px
      );
      padding: 22px 28px 22px 24px;
      z-index: 2;
      overflow: hidden;
      background: transparent;
    }

    /* ── CINEMATIC FLASH — slow bloom instead of quick burst ── */
    .flash {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(255,209,102,0.55) 0%,
        rgba(212,137,106,0.28) 50%,
        transparent 75%
      );
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }
    .entering .flash {
      animation: flashBloom 1.6s ease-out 0.3s forwards;
    }
    @keyframes flashBloom {
      0%   { opacity:0;   transform:scale(0.6); }
      25%  { opacity:1;   transform:scale(1); }
      100% { opacity:0;   transform:scale(1.35); }
    }

    /* ── LIGHT SWEEP — slow diagonal reveal ── */
    .sweep {
      position: absolute;
      top: -20%; left: -60%;
      width: 50%; height: 140%;
      background: linear-gradient(105deg,
        transparent 30%,
        rgba(255,220,140,0.12) 50%,
        rgba(240,184,154,0.08) 60%,
        transparent 75%
      );
      transform: skewX(-15deg);
      pointer-events: none;
      z-index: 4;
      opacity: 0;
    }
    .entering .sweep {
      animation: sweepAcross 1.8s cubic-bezier(0.4,0,0.2,1) 0.7s forwards,
                 sweepLoop 7s infinite linear 3.5s;
    }
    @keyframes sweepAcross {
      0%   { left:-60%; opacity:0; }
      15%  { opacity:1; }
      100% { left:130%; opacity:0; }
    }
    @keyframes sweepLoop {
      0%   { left:-60%; opacity:0; }
      8%   { opacity:0.8; }
      50%  { left:130%; opacity:0; }
      100% { left:130%; opacity:0; }
    }

    /* ── SVG BORDER — gradient stroke, slow draw ── */
    .border-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: visible;
    }
    .border-outer {
      stroke-dasharray: 2100;
      stroke-dashoffset: 2100;
    }
    .entering .border-outer {
      animation: drawBorder 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
    }
    .border-inner {
      stroke-dasharray: 1950;
      stroke-dashoffset: 1950;
    }
    .entering .border-inner {
      animation: drawBorder 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.45s forwards;
    }
    @keyframes drawBorder {
      to { stroke-dashoffset: 0; }
    }

    /* ── INNER BEVEL ── */
    .inner-bevel {
      position: absolute; inset: 6px;
      clip-path: polygon(
        16px 0, calc(100% - 16px) 0, 100% 16px,
        100% calc(100% - 16px), calc(100% - 16px) 100%,
        16px 100%, 0 calc(100% - 16px), 0 16px
      );
      border: 1px solid rgba(240,184,154,0.2);
      pointer-events: none;
      z-index: 3;
    }

    /* ── CORNER BRACKETS — gradient coloured ── */
    .cb {
      position: absolute;
      width: 28px; height: 28px;
      border-style: solid;
      z-index: 11;
      pointer-events: none;
      opacity: 0;
    }
    /* Use pseudo for gradient border trick */
    .cb-tl { top:-2px;    left:-2px;   border-width:3px 0 0 3px; border-color: var(--gold-start); filter: drop-shadow(0 0 5px var(--gold-start)); }
    .cb-tr { top:-2px;    right:-2px;  border-width:3px 3px 0 0; border-color: var(--gold-mid);   filter: drop-shadow(0 0 5px var(--gold-mid)); }
    .cb-bl { bottom:-2px; left:-2px;   border-width:0 0 3px 3px; border-color: var(--rose-gold);  filter: drop-shadow(0 0 5px var(--rose-gold)); }
    .cb-br { bottom:-2px; right:-2px;  border-width:0 3px 3px 0; border-color: var(--rose-light); filter: drop-shadow(0 0 5px var(--rose-light)); }

    .entering .cb-tl { animation: cbSlide 0.5s cubic-bezier(0.34,1.4,0.64,1) 0.9s  forwards; --tx:-8px; --ty:-8px; }
    .entering .cb-tr { animation: cbSlide 0.5s cubic-bezier(0.34,1.4,0.64,1) 1.0s  forwards; --tx:8px;  --ty:-8px; }
    .entering .cb-bl { animation: cbSlide 0.5s cubic-bezier(0.34,1.4,0.64,1) 1.05s forwards; --tx:-8px; --ty:8px;  }
    .entering .cb-br { animation: cbSlide 0.5s cubic-bezier(0.34,1.4,0.64,1) 1.1s  forwards; --tx:8px;  --ty:8px;  }
    @keyframes cbSlide {
      0%   { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.7); }
      100% { opacity:1; transform:translate(0,0) scale(1); }
    }

    /* ── PARTICLES — rose-gold tones ── */
    .pf { position:absolute; inset:0; pointer-events:none; z-index:6; overflow:hidden; }
    .p  {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      opacity: 0;
    }
    /* alternate gold vs rose particles */
    .p:nth-child(odd)  { background:#FFD166; box-shadow:0 0 7px #FFD166; }
    .p:nth-child(even) { background:#D4896A; box-shadow:0 0 7px #D4896A; }

    .entering .p { animation: pfloat 6s infinite ease-in-out; }
    .p:nth-child(1)  { top:12%; left:9%;  animation-delay:1.1s; width:5px; height:5px; }
    .p:nth-child(2)  { top:78%; left:91%; animation-delay:1.8s; }
    .p:nth-child(3)  { top:32%; left:22%; animation-delay:2.5s; width:6px; height:6px; }
    .p:nth-child(4)  { top:82%; left:46%; animation-delay:1.5s; }
    .p:nth-child(5)  { top:22%; left:70%; animation-delay:3.2s; }
    .p:nth-child(6)  { top:62%; left:14%; animation-delay:2.9s; width:3px; height:3px; }
    .p:nth-child(7)  { top:6%;  left:52%; animation-delay:4.0s; width:5px; height:5px; }
    .p:nth-child(8)  { top:88%; left:74%; animation-delay:3.5s; }
    .p:nth-child(9)  { top:50%; left:86%; animation-delay:1.3s; width:4px; height:4px; }
    .p:nth-child(10) { top:20%; left:36%; animation-delay:4.3s; width:5px; height:5px; }
    .p:nth-child(11) { top:42%; left:58%; animation-delay:2.1s; width:3px; height:3px; }
    .p:nth-child(12) { top:68%; left:30%; animation-delay:3.7s; }
    @keyframes pfloat {
      0%   { opacity:0;   transform:translateY(0)     scale(0.4) rotate(0deg); }
      20%  { opacity:0.9; transform:translateY(-12px)  scale(1.15) rotate(45deg); }
      65%  { opacity:0.4; transform:translateY(5px)    scale(0.9)  rotate(90deg); }
      100% { opacity:0;   transform:translateY(22px)   scale(0.3)  rotate(135deg); }
    }

    /* ═══════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════ */
    .layout {
      display: flex;
      align-items: center;
      gap: 26px;
      position: relative;
      z-index: 5;
    }

    /* ── MASCOT ── */
    .mascot-wrap {
      flex-shrink: 0;
      position: relative;
      width: 108px; height: 108px;
      opacity: 0;
      transform: scale(0.3) rotate(-18deg);
    }
    .entering .mascot-wrap {
      animation: mascotReveal 0.9s cubic-bezier(0.34, 1.45, 0.64, 1) 0.55s forwards;
    }
    @keyframes mascotReveal {
      0%   { opacity:0; transform:scale(0.3) rotate(-18deg); filter:blur(6px); }
      60%  { filter:blur(0); }
      100% { opacity:1; transform:scale(1) rotate(0deg); filter:blur(0); }
    }
    .mascot-bg {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #c98010, #7a4e00);
      border: 2.5px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 2.5px var(--gold-mid),
        0 0 22px rgba(232,164,74,0.85),
        inset 0 0 14px rgba(255,220,80,0.35);
      animation: mascotAura 2.8s infinite alternate;
    }
    @keyframes mascotAura {
      0%   { box-shadow: 0 0 0 2.5px var(--gold-mid),  0 0 16px rgba(212,137,106,0.65), inset 0 0 8px  rgba(255,200,60,0.25); }
      100% { box-shadow: 0 0 0 2.5px var(--rose-light), 0 0 32px rgba(240,184,154,0.9), inset 0 0 20px rgba(255,220,140,0.5); }
    }
    .mascot-img {
      position:absolute; inset:3px;
      width:calc(100% - 6px); height:calc(100% - 6px);
      border-radius:50%; object-fit:cover; display:block;
    }
    .mascot-fallback {
      position:absolute; inset:3px; border-radius:50%;
      display:none; align-items:center; justify-content:center;
      font-size:46px;
      background:radial-gradient(circle at 35% 30%, #a06a10, #5a3800);
    }

    /* ── TEXT BLOCK ── */
    .text-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* each row fades up with stagger */
    .username, .amount-row, .message {
      opacity: 0;
      transform: translateY(16px);
      filter: blur(3px);
    }
    .entering .username   { animation: textRise 0.7s cubic-bezier(0.22,1,0.36,1) 0.85s  forwards; }
    .entering .amount-row { animation: textRise 0.7s cubic-bezier(0.22,1,0.36,1) 1.05s  forwards; }
    .entering .message    { animation: textRise 0.7s cubic-bezier(0.22,1,0.36,1) 1.22s  forwards; }
    @keyframes textRise {
      0%   { opacity:0; transform:translateY(16px); filter:blur(3px); }
      100% { opacity:1; transform:translateY(0);    filter:blur(0); }
    }

    /* Gradient text helper — applied via -webkit-background-clip */
    .grad-text {
      background: var(--grad-h);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      /* shimmer animation on the gradient */
      background-size: 200% 100%;
      animation: gradShimmer 4s infinite linear;
    }
    @keyframes gradShimmer {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* Fallback solid color for browsers that don't support -webkit-text-fill-color */
    @supports not (-webkit-background-clip: text) {
      .grad-text { color: var(--gold-mid); }
    }

    /* Username */
    .username {
      font-family: 'Syne', sans-serif;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 4px;
      line-height: 1.1;
      /* drop shadow behind the transparent gradient text */
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.9)) drop-shadow(0 0 18px rgba(212,137,106,0.5));
    }

    /* Amount row */
    .amount-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-top: 2px;
    }

    .amount {
      font-family: 'Syncopate', sans-serif;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 2px;
      line-height: 1.1;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.9)) drop-shadow(0 0 22px rgba(212,137,106,0.55));
    }

    .text-badge {
      font-family: 'Syncopate', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      /* pill with a gradient border */
      padding: 3px 10px;
      position: relative;
      background: rgba(255,209,102,0.08);
      border-radius: 2px;
    }
    /* gradient border via box-shadow */
    .text-badge::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 2px;
      padding: 1px;
      background: var(--grad-h);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Message */
    .message {
      font-family: 'Syne', sans-serif;
      font-size: 21px;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.4px;
      margin-top: 7px;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.9),
        0 0 16px rgba(212,137,106,0.4);
      /* subtle rose warmth on quotes */
      opacity: 0.92;
    }

    /* ── EQUALIZER — staggered, gold→rose bars ── */
    .eq {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 68px;
      padding-right: 2px;
      opacity: 0;
    }
    .entering .eq {
      animation: eqFadeIn 0.6s ease 1.35s forwards;
    }
    @keyframes eqFadeIn { to { opacity:1; } }

    .bar {
      width: 7px;
      border-radius: 2px 2px 1px 1px;
    }
    /* gradient each bar along the gold→rose palette */
    .bar:nth-child(1) { background:linear-gradient(to top,#8B5000,#FFD166,#FFF0B0); box-shadow:0 0 8px rgba(255,209,102,0.7); }
    .bar:nth-child(2) { background:linear-gradient(to top,#8B4800,#F0BE62,#FFE8A0); box-shadow:0 0 8px rgba(240,190,98,0.7); }
    .bar:nth-child(3) { background:linear-gradient(to top,#882E00,#E8A44A,#FFD888); box-shadow:0 0 8px rgba(232,164,74,0.7); }
    .bar:nth-child(4) { background:linear-gradient(to top,#7A2400,#DA8A52,#FFC877); box-shadow:0 0 8px rgba(218,138,82,0.7); }
    .bar:nth-child(5) { background:linear-gradient(to top,#6E1E00,#CC7A5E,#F0B070); box-shadow:0 0 8px rgba(204,122,94,0.7); }
    .bar:nth-child(6) { background:linear-gradient(to top,#641800,#D4896A,#F0B89A); box-shadow:0 0 8px rgba(212,137,106,0.75); }
    .bar:nth-child(7) { background:linear-gradient(to top,#5A1400,#E09888,#F0C4B0); box-shadow:0 0 8px rgba(240,184,154,0.8); }

    .entering .bar { animation: eqAnim ease-in-out alternate infinite; }
    .bar:nth-child(1) { animation-duration:0.72s; animation-delay:1.35s; }
    .bar:nth-child(2) { animation-duration:1.15s; animation-delay:1.45s; }
    .bar:nth-child(3) { animation-duration:0.88s; animation-delay:1.40s; }
    .bar:nth-child(4) { animation-duration:0.62s; animation-delay:1.55s; }
    .bar:nth-child(5) { animation-duration:1.05s; animation-delay:1.42s; }
    .bar:nth-child(6) { animation-duration:0.78s; animation-delay:1.50s; }
    .bar:nth-child(7) { animation-duration:0.95s; animation-delay:1.38s; }
    @keyframes eqAnim {
      0%   { height:6px;  opacity:0.55; }
      100% { height:58px; opacity:1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width:700px) {
      .card { padding:14px 16px; }
      .username { font-size:28px; letter-spacing:2px; }
      .amount   { font-size:28px; }
      .text-badge { font-size:10px; }
      .message  { font-size:16px; }
      .mascot-wrap { width:80px; height:80px; }
      .eq { height:50px; }
    }
  </style>
</head>
<body>
  <div class="outer-wrap" id="alertWrap">
    <div class="card">

      <div class="flash"></div>
      <div class="sweep"></div>
      <div class="inner-bevel"></div>

      <!-- SVG border — gradient via linearGradient -->
      <svg class="border-svg" viewBox="0 0 900 148" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#FFD166"/>
            <stop offset="42%"  stop-color="#E8A44A"/>
            <stop offset="75%"  stop-color="#D4896A"/>
            <stop offset="100%" stop-color="#F0B89A"/>
          </linearGradient>
          <filter id="gf" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.8" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polygon class="border-outer"
          points="22,1 878,1 899,22 899,126 878,147 22,147 1,126 1,22"
          fill="none" stroke="url(#borderGrad)" stroke-width="2.5" filter="url(#gf)"
        />
        <polygon class="border-inner"
          points="30,9 870,9 891,30 891,118 870,139 30,139 9,118 9,30"
          fill="none" stroke="rgba(240,184,154,0.22)" stroke-width="1"
        />
      </svg>

      <!-- Corner brackets -->
      <div class="cb cb-tl"></div>
      <div class="cb cb-tr"></div>
      <div class="cb cb-bl"></div>
      <div class="cb cb-br"></div>

      <!-- Particles -->
      <div class="pf">
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
      </div>

      <!-- MAIN LAYOUT -->
      <div class="layout">

        <!-- Mascot -->
        <div class="mascot-wrap">
          <div class="mascot-bg"></div>
          <img src="sidd-logo.jpg" alt="Siddharth" class="mascot-img"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="mascot-fallback">🐒</div>
        </div>

        <!-- Text -->
        <div class="text-block">
          <div class="username grad-text">SIDDHARTH</div>
          <div class="amount-row">
            <div class="amount grad-text">₹40</div>
            <div class="text-badge grad-text">TEXT</div>
          </div>
          <div class="message">"SIDD BHAI VANDAL SKIN REVIEW"</div>
        </div>

        <!-- Equalizer -->
        <div class="eq">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const wrap = document.getElementById('alertWrap');

    function playEnter() {
      wrap.classList.remove('leaving');
      wrap.classList.add('entering');
    }
    function playLeave() {
      wrap.classList.remove('entering');
      wrap.classList.add('leaving');
    }

    window.addEventListener('load', () => {
      setTimeout(playEnter, 120);
      // setTimeout(playLeave, 10000); // uncomment for auto-dismiss
    });
  </script>
</body>
</html>
